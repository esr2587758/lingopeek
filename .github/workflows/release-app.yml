name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-app-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Sparkle release
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Validate Sparkle secrets
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          test -n "$SPARKLE_PUBLIC_ED_KEY" || { echo "Missing SPARKLE_PUBLIC_ED_KEY secret"; exit 1; }
          test -n "$SPARKLE_PRIVATE_ED_KEY" || { echo "Missing SPARKLE_PRIVATE_ED_KEY secret"; exit 1; }

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          test -n "$MACOS_CERTIFICATE_P12_BASE64" || { echo "Missing MACOS_CERTIFICATE_P12_BASE64 secret"; exit 1; }
          test -n "$MACOS_CERTIFICATE_PASSWORD" || { echo "Missing MACOS_CERTIFICATE_PASSWORD secret"; exit 1; }

          KEYCHAIN_PATH="$RUNNER_TEMP/lingopeek-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          P12_PATH="$RUNNER_TEMP/lingopeek-signing.p12"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          IDENTITY_LIST="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true)"
          if ! grep -q '"' <<< "$IDENTITY_LIST"; then
            IDENTITY_LIST="$(security find-identity -v "$KEYCHAIN_PATH" || true)"
          fi
          echo "$IDENTITY_LIST"

          if [[ -n "$MACOS_SIGN_IDENTITY" ]] && grep -F "$MACOS_SIGN_IDENTITY" <<< "$IDENTITY_LIST" >/dev/null; then
            SIGN_IDENTITY="$MACOS_SIGN_IDENTITY"
          else
            SIGN_IDENTITY="$(awk '/"/ { print $2; exit }' <<< "$IDENTITY_LIST")"
          fi

          if [[ -z "$SIGN_IDENTITY" ]]; then
            echo "No valid code signing identity was found after importing the p12."
            echo "Re-export from Keychain Access > My Certificates, selecting the certificate row with its private key expanded underneath."
            exit 1
          fi

          echo "Using signing identity: $SIGN_IDENTITY"
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Run core checks
        run: scripts/run_core_checks.sh

      - name: Package app
        env:
          APP_VERSION: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
        run: |
          APP_VERSION="${APP_VERSION#v}" scripts/package_app.sh

      - name: Write release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "# LingoPeek ${VERSION}"
            echo
            echo "Build ${GITHUB_RUN_NUMBER} from ${GITHUB_SHA}."
          } > dist/release-notes.md

      - name: Generate Sparkle appcast
        env:
          APP_VERSION: ${{ github.ref_name }}
          DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          PRODUCT_LINK: https://github.com/${{ github.repository }}
          RELEASE_NOTES_FILE: dist/release-notes.md
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          APP_VERSION="${APP_VERSION#v}" scripts/create_appcast.sh

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/LingoPeek.zip dist/appcast.xml --clobber
            gh release edit "$GITHUB_REF_NAME" --title "LingoPeek ${VERSION}" --notes-file dist/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" dist/LingoPeek.zip dist/appcast.xml \
              --title "LingoPeek ${VERSION}" \
              --notes-file dist/release-notes.md \
              --verify-tag
          fi
