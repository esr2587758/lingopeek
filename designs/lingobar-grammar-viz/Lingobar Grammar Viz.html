<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingobar — 语法解析（可视化）</title>
<style>
/* ============================================================
   Lingobar — 语法解析（图文并茂 / 多视图可视化）
   深色玻璃单配色。成分按角色分配色相。
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #0d0e12; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
#root { height: 100vh; }

:root {
  --accent: #6e8bff; --accent-2: #8a7dff; --accent-text: #aab6ff; --accent-weak: rgba(110,139,255,.16);
  --glass: rgba(28,30,40,.82); --hairline: rgba(255,255,255,.09); --hairline-strong: rgba(255,255,255,.15);
  --text: rgba(255,255,255,.95); --text-2: rgba(255,255,255,.6); --text-3: rgba(255,255,255,.38);
  --chip: rgba(255,255,255,.06); --chip-hover: rgba(255,255,255,.11);
  --shadow: 0 0 0 1px rgba(255,255,255,.06), 0 30px 70px -18px rgba(0,0,0,.75);
  --radius: 16px; --mono: "Space Grotesk", ui-monospace, "SF Mono", Menlo, monospace;
  --read: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --ease: cubic-bezier(.22,.61,.36,1);
}

.stage { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
.wallpaper { position: absolute; inset: 0; background: radial-gradient(130% 130% at 14% 6%, #2d3a66 0%, #232a4a 34%, #1a1d33 64%, #111322 100%); }
.wallpaper::after { content: ""; position: absolute; inset: 0; mix-blend-mode: screen;
  background: radial-gradient(38% 46% at 84% 12%, rgba(255,160,110,.3), transparent 70%),
    radial-gradient(48% 56% at 90% 94%, rgba(120,90,210,.38), transparent 70%),
    radial-gradient(30% 40% at 12% 92%, rgba(70,190,200,.2), transparent 70%); }
.menubar { position: absolute; top: 0; left: 0; right: 0; height: 26px; display: flex; align-items: center; gap: 18px;
  padding: 0 14px; font-size: 13px; color: rgba(255,255,255,.92); background: rgba(0,0,0,.2);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 5; }
.menubar .mb-app { font-weight: 600; } .menubar .mb-item { opacity: .8; }
.menubar .mb-right { margin-left: auto; display: flex; align-items: center; gap: 16px; opacity: .9; }
.menubar .mono { font-variant-numeric: tabular-nums; }

.gwin { position: absolute; top: 64px; left: 50%; transform: translateX(-50%); width: 720px;
  height: calc(100vh - 110px); max-height: 800px; display: flex; flex-direction: column; gap: 8px;
  animation: gin .26s var(--ease); }
@keyframes gin { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%); } }

.g-pill { display: flex; align-items: center; gap: 10px; padding: 9px 10px 9px 14px; border-radius: 13px;
  background: var(--glass); backdrop-filter: blur(28px) saturate(150%); -webkit-backdrop-filter: blur(28px) saturate(150%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline); flex: none; }
.g-pill-left { display: flex; align-items: center; gap: 11px; flex: 1; }
.g-pill-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-weak); color: var(--accent-text); display: grid; place-items: center; flex: none; }
.g-pill-meta { display: flex; flex-direction: column; gap: 1px; }
.g-title { font-size: 14.5px; font-weight: 600; color: var(--text); }
.g-sub { font-size: 11px; color: var(--text-3); }
.g-iconbtn { width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent; color: var(--text-3);
  display: grid; place-items: center; cursor: pointer; transition: background .14s, color .14s; }
.g-iconbtn:hover { background: var(--chip-hover); color: var(--text); }

.g-panel { border-radius: var(--radius); background: var(--glass);
  backdrop-filter: blur(30px) saturate(155%); -webkit-backdrop-filter: blur(30px) saturate(155%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline); overflow: auto; display: flex; flex-direction: column; }
/* 防止 flex 列子项被压缩重叠：自然高度 + 容器滚动 */
.g-panel > * { flex: none; }

.g-sentence { padding: 18px 20px 14px; border-bottom: 1px solid var(--hairline); }
.g-sentence-en { font-size: 19px; line-height: 1.55; color: var(--text); font-family: var(--read); font-weight: 500; }
.g-sentence-zh { font-size: 13.5px; color: var(--text-2); margin-top: 8px; line-height: 1.7; }

.g-viewtabs { display: flex; gap: 6px; padding: 12px 16px; flex-wrap: wrap; border-bottom: 1px solid var(--hairline); }
.g-viewtab { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 500; font-family: inherit;
  padding: 7px 12px; border-radius: 9px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.g-viewtab:hover { background: var(--chip); color: var(--text); }
.g-viewtab[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }

.g-viz { padding: 16px 20px; border-bottom: 1px solid var(--hairline); min-height: 150px; }

.gx-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
.gx-legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-2); cursor: default; transition: opacity .14s; }
.gx-legend-item[data-dim] { opacity: .35; }
.gx-legend-dot { width: 9px; height: 9px; border-radius: 3px; }

.gx-annot-sentence { font-size: 18px; line-height: 2.4; font-family: var(--read); }
.gx-chunk { position: relative; padding: 3px 5px; border-radius: 6px; margin-right: 2px; cursor: default;
  background: var(--role-hl); box-shadow: inset 0 -2px 0 var(--role-color); transition: opacity .14s, filter .14s; }
.gx-chunk[data-dim] { opacity: .32; }
.gx-chunk-tag { position: absolute; top: -9px; left: 4px; font-size: 9px; font-weight: 600; color: #fff;
  padding: 1px 5px; border-radius: 4px; white-space: nowrap; font-family: var(--read); opacity: 0; transform: translateY(3px); transition: opacity .14s, transform .14s; pointer-events: none; }
.gx-chunk:hover .gx-chunk-tag { opacity: 1; transform: none; }
.gx-annot-notes { margin-top: 22px; display: flex; flex-direction: column; gap: 9px; }
.gx-note { display: flex; gap: 10px; transition: opacity .14s; }
.gx-note[data-dim] { opacity: .32; }
.gx-note-bar { width: 3px; border-radius: 2px; flex: none; }
.gx-note-label { font-size: 11px; font-weight: 600; margin-right: 8px; }
.gx-note-text { font-size: 13.5px; color: var(--text); font-family: var(--read); }
.gx-note-zh { font-size: 12px; color: var(--text-3); margin-top: 3px; line-height: 1.55; }

.gx-dep { position: relative; padding-top: 4px; }
.gx-dep-svg { display: block; }
.gx-dep-tokens { display: flex; flex-wrap: wrap; gap: 6px; font-size: 14px; font-family: var(--read); }
.gx-dep-tok { padding: 5px 9px; border-radius: 7px; background: var(--chip); color: var(--text);
  box-shadow: inset 0 -2px 0 var(--role-color); cursor: default; transition: opacity .14s, background .14s; }
.gx-dep-tok:hover { background: var(--chip-hover); }
.gx-dep-tok[data-dim] { opacity: .32; }

.gx-tree { font-family: var(--read); }
.gx-tree-row { display: flex; align-items: center; gap: 9px; padding: 6px 0; position: relative; }
.gx-tree-rail { width: 3px; height: 16px; border-radius: 2px; flex: none; }
.gx-tree-label { font-size: 11px; font-weight: 600; flex: none; min-width: 76px; }
.gx-tree-text { font-size: 13.5px; color: var(--text); }
.gx-tree-children { border-left: 1px dashed var(--hairline-strong); margin-left: 1px; padding-left: 4px; }

.gx-trunk-core { display: flex; flex-wrap: wrap; gap: 8px; font-size: 19px; font-family: var(--read); }
.gx-trunk-tok { padding: 5px 11px; border-radius: 9px; background: var(--role-hl); color: var(--text);
  box-shadow: inset 0 0 0 1px var(--role-color); }
.gx-trunk-zh { font-size: 14px; color: var(--text-2); margin-top: 12px; }
.gx-trunk-dropped { margin-top: 16px; display: flex; flex-wrap: wrap; align-items: center; gap: 7px; }
.gx-trunk-dropped .lbl { font-size: 11px; color: var(--text-3); }
.gx-trunk-chip { font-size: 12px; color: var(--text-3); padding: 4px 10px; border-radius: 7px; background: var(--chip);
  text-decoration: line-through; text-decoration-color: var(--text-3); }

.g-pattern { padding: 13px 20px; border-bottom: 1px solid var(--hairline); background: rgba(110,139,255,.05); }
.g-pattern-lbl { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--accent-text); }
.g-pattern-en { font-size: 14.5px; font-family: var(--mono); color: var(--text); margin-top: 5px; }
.g-pattern-zh { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }

.g-knowledge { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 20px; border-bottom: 1px solid var(--hairline); }
.g-col-head { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; }
.g-col-head svg { color: var(--accent-text); }
.g-col-head-sp { margin-top: 16px; }

.gx-colloc { padding: 11px 12px; border-radius: 11px; background: var(--chip); margin-bottom: 9px; }
.gx-colloc-head { display: flex; align-items: center; gap: 8px; }
.gx-colloc-phrase { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--accent-text); }
.gx-colloc-pos { font-size: 10.5px; color: var(--text-3); font-style: italic; }
.gx-mini-play { margin-left: auto; width: 24px; height: 24px; border-radius: 6px; border: none; background: var(--chip-hover);
  color: var(--text-2); display: grid; place-items: center; cursor: pointer; transition: all .14s; }
.gx-mini-play:hover { background: var(--accent); color: #fff; }
.gx-colloc-zh { font-size: 13px; color: var(--text); margin-top: 6px; }
.gx-colloc-note { font-size: 11.5px; color: var(--text-3); margin-top: 4px; line-height: 1.55; }
.gx-colloc-eg { font-size: 12.5px; color: var(--text-2); margin-top: 7px; padding: 6px 9px; border-radius: 7px; background: rgba(255,255,255,.03); font-family: var(--read); line-height: 1.5; }
.gx-colloc-eg .eg-tag { color: var(--accent-text); font-weight: 600; font-style: italic; margin-right: 4px; }

.g-phrases { display: flex; flex-wrap: wrap; gap: 7px; }
.g-phrase { display: inline-flex; flex-direction: column; gap: 1px; padding: 6px 10px; border-radius: 8px; background: var(--chip); cursor: default; transition: background .14s; }
.g-phrase:hover { background: var(--chip-hover); }
.g-phrase span[lang="en"] { font-size: 13px; color: var(--text); font-family: var(--read); }
.g-phrase-zh { font-size: 10.5px; color: var(--text-3); }

.gx-point { padding: 11px 12px 11px 14px; border-radius: 11px; background: var(--chip); margin-bottom: 9px; position: relative; overflow: hidden; }
.gx-point::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--pt-color); }
.gx-point-head { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.gx-point-tag { font-size: 10px; font-weight: 600; color: #fff; background: var(--pt-color); padding: 2px 7px; border-radius: 5px; flex: none; }
.gx-point-title { font-size: 13px; font-weight: 600; color: var(--text); }
.gx-point-body { font-size: 12px; color: var(--text-2); line-height: 1.6; }

.g-foot { display: flex; align-items: center; gap: 6px; padding: 11px 16px 13px; }
.g-foot-btn { display: inline-flex; align-items: center; gap: 5px; height: 32px; padding: 0 13px; border-radius: 8px; border: none;
  background: var(--chip); color: var(--text-2); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background .14s, color .14s, filter .14s; }
.g-foot-btn:hover { background: var(--chip-hover); color: var(--text); }
.g-foot-btn.primary { background: var(--accent); color: #fff; }
.g-foot-btn.primary:hover { filter: brightness(1.08); }
.g-foot-spacer { flex: 1; }

.toast { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); display: flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: 9px; background: #fff; color: #1a1a1f; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: toast-in .2s var(--ease); z-index: 50; pointer-events: none; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%,8px); } to { opacity: 1; transform: translate(-50%,0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
