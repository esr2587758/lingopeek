<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingobar — 设置界面</title>
<style>
/* ============================================================
   Lingobar — 设置界面（左右两栏）
   单一深色玻璃配色，与 lingobar-collection / interactions 一致。
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #0d0e12; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
#root { height: 100vh; }

:root {
  --accent: #6e8bff; --accent-2: #8a7dff; --accent-text: #aab6ff; --accent-weak: rgba(110,139,255,.16);
  --glass: rgba(28,30,40,.82); --hairline: rgba(255,255,255,.09); --hairline-strong: rgba(255,255,255,.15);
  --text: rgba(255,255,255,.95); --text-2: rgba(255,255,255,.6); --text-3: rgba(255,255,255,.38);
  --chip: rgba(255,255,255,.06); --chip-hover: rgba(255,255,255,.11);
  --shadow: 0 0 0 1px rgba(255,255,255,.06), 0 30px 70px -18px rgba(0,0,0,.75);
  --radius: 16px; --mono: "Space Grotesk", ui-monospace, "SF Mono", Menlo, monospace;
  --ease: cubic-bezier(.22,.61,.36,1);
  --ok: #4fd0a0; --warn: #e0915c;
}

/* stage */
.stage { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
.wallpaper { position: absolute; inset: 0; background: radial-gradient(130% 130% at 14% 6%, #2d3a66 0%, #232a4a 34%, #1a1d33 64%, #111322 100%); }
.wallpaper::after { content: ""; position: absolute; inset: 0; mix-blend-mode: screen;
  background: radial-gradient(38% 46% at 84% 12%, rgba(255,160,110,.32), transparent 70%),
    radial-gradient(48% 56% at 90% 94%, rgba(120,90,210,.4), transparent 70%),
    radial-gradient(30% 40% at 12% 92%, rgba(70,190,200,.22), transparent 70%); }
.menubar { position: absolute; top: 0; left: 0; right: 0; height: 26px; display: flex; align-items: center; gap: 18px;
  padding: 0 14px; font-size: 13px; color: rgba(255,255,255,.92); background: rgba(0,0,0,.2);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 5; }
.menubar .mb-app { font-weight: 600; }
.menubar .mb-item { opacity: .8; }
.menubar .mb-right { margin-left: auto; display: flex; align-items: center; gap: 16px; opacity: .9; }
.menubar .mono { font-variant-numeric: tabular-nums; }

/* window */
.setwin { position: absolute; top: 78px; left: 50%; transform: translateX(-50%); width: 760px;
  height: calc(100vh - 140px); max-height: 680px; border-radius: var(--radius); background: var(--glass);
  backdrop-filter: blur(32px) saturate(155%); -webkit-backdrop-filter: blur(32px) saturate(155%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline); display: flex; overflow: hidden;
  animation: win-in .26s var(--ease); }
@keyframes win-in { from { opacity: 0; } to { opacity: 1; } }

/* left nav */
.set-side { width: 212px; flex: none; border-right: 1px solid var(--hairline); padding: 14px 10px;
  display: flex; flex-direction: column; gap: 2px; overflow: auto; }
.set-brand { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; padding: 2px 8px 12px; }
.set-navitem { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 10px; border: none;
  background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; text-align: left; transition: background .12s, color .12s; }
.set-navitem:hover { background: var(--chip); color: var(--text); }
.set-navitem[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); }
.set-navicon { display: grid; place-items: center; width: 26px; height: 26px; border-radius: 7px; background: var(--chip); flex: none; }
.set-navitem[data-active="true"] .set-navicon { background: rgba(110,139,255,.2); }
.set-navtext { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.set-navtext .nm { font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.set-navtext .ds { font-size: 11px; color: var(--text-3); }
.set-navitem[data-active="true"] .ds { color: var(--accent-text); opacity: .7; }
.set-gate-flag { width: 6px; height: 6px; border-radius: 50%; background: var(--warn); flex: none; }
.set-side-foot { margin-top: auto; padding: 10px 6px 2px; }
.set-gate-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; padding: 5px 10px; border-radius: 8px;
  background: rgba(224,145,92,.14); color: var(--warn); }
.set-gate-pill.ok { background: rgba(79,208,160,.14); color: var(--ok); }

/* right content */
.set-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.set-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--hairline); }
.set-head-title { font-size: 18px; font-weight: 600; color: var(--text); }
.set-head-desc { font-size: 12.5px; color: var(--text-3); margin-top: 2px; }
.set-scroll { overflow: auto; padding: 18px 22px 26px; flex: 1; }

/* group */
.st-group { margin-bottom: 22px; }
.st-group-title { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); margin-bottom: 9px; padding-left: 2px; }
.st-group-body { border-radius: 12px; background: var(--chip); overflow: hidden; }

/* row */
.st-row { display: flex; align-items: center; gap: 16px; padding: 13px 15px; border-bottom: 1px solid var(--hairline); }
.st-row:last-child { border-bottom: none; }
.st-row-label { flex: 1; min-width: 0; }
.st-row-title { font-size: 13.5px; color: var(--text); font-weight: 500; display: flex; align-items: center; gap: 7px; }
.st-row-desc { font-size: 11.5px; color: var(--text-3); margin-top: 3px; line-height: 1.5; }
.st-row-ctrl { flex: none; display: flex; align-items: center; }
.st-gate-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--warn); }

/* toggle */
.st-toggle { width: 42px; height: 25px; border-radius: 13px; border: none; background: var(--chip-hover); cursor: pointer; position: relative; transition: background .18s var(--ease); padding: 0; }
.st-toggle[data-on="true"] { background: var(--accent); }
.st-toggle-knob { position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.35); transition: transform .18s var(--ease); }
.st-toggle[data-on="true"] .st-toggle-knob { transform: translateX(17px); }

/* segmented */
.st-seg { display: flex; gap: 2px; padding: 3px; border-radius: 9px; background: rgba(0,0,0,.22); }
.st-seg-opt { font-size: 12.5px; font-family: inherit; padding: 5px 12px; border-radius: 7px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.st-seg-opt:hover { color: var(--text); }
.st-seg-opt[data-on="true"] { background: var(--accent); color: #fff; }

/* select */
.st-select { position: relative; display: inline-flex; align-items: center; }
.st-select select { appearance: none; -webkit-appearance: none; font-family: inherit; font-size: 13px; color: var(--text);
  background: var(--chip-hover); border: 1px solid var(--hairline); border-radius: 8px; padding: 7px 30px 7px 12px; cursor: pointer; outline: none; }
.st-select select:hover { border-color: var(--hairline-strong); }
.st-select svg { position: absolute; right: 9px; pointer-events: none; color: var(--text-3); }
.st-select option { background: #20222c; color: var(--text); }

/* text field */
.st-input { display: inline-flex; align-items: center; gap: 6px; background: var(--chip-hover); border: 1px solid var(--hairline);
  border-radius: 8px; padding: 0 4px 0 11px; min-width: 220px; transition: border-color .14s; }
.st-input:focus-within { border-color: var(--accent); }
.st-input input { flex: 1; min-width: 0; border: none; background: transparent; outline: none; font-family: inherit; font-size: 13px; color: var(--text); padding: 8px 0; }
.st-input[data-mono="true"] input { font-family: var(--mono); }
.st-input input::placeholder { color: var(--text-3); }
.st-input-reveal { font-size: 11px; font-family: inherit; color: var(--text-3); background: transparent; border: none; cursor: pointer; padding: 4px 7px; border-radius: 6px; }
.st-input-reveal:hover { color: var(--text); background: var(--chip); }

/* badge */
.st-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 7px; }
.st-badge[data-kind="ok"] { background: rgba(79,208,160,.16); color: var(--ok); }
.st-badge[data-kind="muted"] { background: var(--chip-hover); color: var(--text-3); }

/* button */
.st-btn { font-size: 12.5px; font-weight: 600; font-family: inherit; padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; transition: filter .14s, background .14s; }
.st-btn.primary { background: var(--accent); color: #fff; }
.st-btn.primary:hover { filter: brightness(1.08); }

/* hotkey */
.st-hotkey { display: inline-flex; gap: 4px; }
.st-hotkey kbd { font-family: var(--mono); font-size: 12px; min-width: 24px; text-align: center; padding: 4px 8px; border-radius: 6px;
  background: var(--chip-hover); border: 1px solid var(--hairline); color: var(--text); box-shadow: 0 1px 0 rgba(0,0,0,.3); }

/* appearance scheme grid */
.st-scheme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 12px; }
.st-scheme { display: flex; flex-direction: column; gap: 7px; padding: 10px; border-radius: 11px; border: 1px solid var(--hairline);
  background: transparent; cursor: pointer; text-align: left; transition: border-color .14s, background .14s; }
.st-scheme:hover { background: var(--chip-hover); }
.st-scheme[data-on="true"] { border-color: var(--accent); background: var(--accent-weak); }
.st-scheme-preview { height: 46px; border-radius: 8px; position: relative; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(0,0,0,.15); }
.st-scheme-accent { position: absolute; left: 10px; bottom: 10px; width: 36px; height: 8px; border-radius: 4px; }
.st-scheme-nm { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 6px; }
.st-scheme-nm svg { color: var(--accent-text); margin-left: auto; }
.st-scheme-ds { font-size: 11px; color: var(--text-3); }

/* sortable actions */
.st-sortable { padding: 8px; display: flex; flex-direction: column; gap: 5px; }
.st-sort-row { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: 9px; background: rgba(255,255,255,.04);
  cursor: grab; transition: background .12s, box-shadow .12s, transform .12s; }
.st-sort-row:hover { background: var(--chip-hover); }
.st-sort-row:active { cursor: grabbing; }
.st-sort-row[data-over="true"] { box-shadow: inset 0 0 0 1px var(--accent); background: var(--accent-weak); }
.st-sort-grip { color: var(--text-3); display: grid; place-items: center; }
.st-sort-idx { font-family: var(--mono); font-size: 11px; color: var(--text-3); width: 14px; text-align: center; }
.st-sort-icon { color: var(--accent-text); display: grid; place-items: center; width: 24px; height: 24px; border-radius: 6px; background: var(--chip); }
.st-sort-label { font-size: 13.5px; color: var(--text); font-weight: 500; }
.st-sort-note { margin-left: auto; font-size: 11px; color: var(--text-3); padding: 2px 8px; border-radius: 6px; background: var(--chip); }

/* radio card (collection target) */
.st-radio-card { display: flex; align-items: flex-start; gap: 11px; width: 100%; padding: 13px 15px; border: none; border-bottom: 1px solid var(--hairline);
  background: transparent; cursor: pointer; text-align: left; transition: background .12s; font-family: inherit; }
.st-radio-card:last-child { border-bottom: none; }
.st-radio-card:hover { background: var(--chip-hover); }
.st-radio-card[data-on="true"] { background: var(--accent-weak); }
.st-radio-dot { flex: none; width: 17px; height: 17px; border-radius: 50%; border: 2px solid var(--text-3); margin-top: 2px; position: relative; transition: border-color .14s; }
.st-radio-dot[data-on="true"] { border-color: var(--accent); }
.st-radio-dot[data-on="true"]::after { content: ""; position: absolute; inset: 3px; border-radius: 50%; background: var(--accent); }
.st-radio-text { display: flex; flex-direction: column; gap: 3px; }
.st-radio-title { font-size: 13.5px; font-weight: 600; color: var(--text); }
.st-radio-desc { font-size: 11.5px; color: var(--text-3); line-height: 1.5; }

/* gate banner / notes */
.st-gate-banner { display: flex; align-items: center; gap: 9px; padding: 11px 14px; border-radius: 10px; margin-bottom: 18px;
  background: rgba(224,145,92,.13); border: 1px solid rgba(224,145,92,.25); color: var(--warn); font-size: 12.5px; line-height: 1.5; }
.st-inline-note { font-size: 12px; color: var(--text-3); margin: 0; padding: 11px 14px 2px; }
.st-foot-note { font-size: 11.5px; color: var(--text-3); line-height: 1.6; margin: 4px 2px 0; }

/* about */
.st-about { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 30px 20px; text-align: center; }
.st-about-logo { width: 56px; height: 56px; border-radius: 14px; display: grid; place-items: center; background: var(--accent-weak); color: var(--accent-text); margin-bottom: 6px; }
.st-about-name { font-size: 18px; font-weight: 600; color: var(--text); }
.st-about-ver { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.st-about-desc { font-size: 12.5px; color: var(--text-2); margin-top: 6px; }
.st-about-links { display: flex; gap: 18px; margin-top: 14px; }
.st-about-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; color: var(--accent-text); cursor: pointer; }
.st-about-link:hover { text-decoration: underline; }

/* toast */
.toast { position: absolute; left: 50%; bottom: 56px; transform: translateX(-50%); display: flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: 9px; background: #fff; color: #1a1a1f; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: toast-in .2s var(--ease); z-index: 50; pointer-events: none; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%,8px); } to { opacity: 1; transform: translate(-50%,0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
