<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingobar — 收藏界面探索</title>
<style>
/* ============================================================
   Lingobar — 收藏界面探索
   单一深色玻璃配色（复用 lingobar-interactions token）。
   三套形态：紧凑浮窗 / 中等双栏 / 大库视图。
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #0d0e12; color: #fff;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  overflow: hidden;
}
#root { height: 100vh; }
:lang(zh) { line-height: 1.7; }
:lang(en) { line-height: 1.5; }

:root {
  --accent: #6e8bff;
  --accent-2: #8a7dff;
  --accent-text: #aab6ff;
  --accent-weak: rgba(110,139,255,.16);
  --glass: rgba(28,30,40,.82);
  --glass-2: rgba(40,43,56,.7);
  --hairline: rgba(255,255,255,.09);
  --hairline-strong: rgba(255,255,255,.15);
  --text: rgba(255,255,255,.95);
  --text-2: rgba(255,255,255,.6);
  --text-3: rgba(255,255,255,.38);
  --chip: rgba(255,255,255,.06);
  --chip-hover: rgba(255,255,255,.11);
  --shadow: 0 0 0 1px rgba(255,255,255,.06), 0 30px 70px -18px rgba(0,0,0,.75);
  --radius: 16px;
  --read: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --mono: "Space Grotesk", ui-monospace, "SF Mono", Menlo, monospace;
  --ease: cubic-bezier(.22,.61,.36,1);
  /* per-type accent hues (kept within a cohesive cool/warm spread) */
  --t-phrase: #6e8bff;
  --t-pattern: #8a7dff;
  --t-example: #4fb8c9;
  --t-rewrite: #e0915c;
  --t-text: #9aa0ad;
}

/* ---------- stage ---------- */
.stage { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
.wallpaper { position: absolute; inset: 0;
  background: radial-gradient(130% 130% at 14% 6%, #2d3a66 0%, #232a4a 34%, #1a1d33 64%, #111322 100%); }
.wallpaper::after { content: ""; position: absolute; inset: 0; mix-blend-mode: screen;
  background:
    radial-gradient(38% 46% at 84% 12%, rgba(255,160,110,.34), transparent 70%),
    radial-gradient(48% 56% at 90% 94%, rgba(120,90,210,.4), transparent 70%),
    radial-gradient(30% 40% at 12% 92%, rgba(70,190,200,.24), transparent 70%); }

.menubar { position: absolute; top: 0; left: 0; right: 0; height: 26px;
  display: flex; align-items: center; gap: 18px; padding: 0 14px;
  font-size: 13px; color: rgba(255,255,255,.92);
  background: rgba(0,0,0,.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 5; }
.menubar .mb-app { font-weight: 600; }
.menubar .mb-item { opacity: .8; }
.menubar .mb-right { margin-left: auto; display: flex; align-items: center; gap: 16px; opacity: .9; }
.menubar .mono { font-variant-numeric: tabular-nums; }

/* ---------- shared bits ---------- */
.iconbtn { width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent;
  color: var(--text-3); display: grid; place-items: center; cursor: pointer;
  transition: background .14s, color .14s; flex: none; }
.iconbtn:hover { background: var(--chip-hover); color: var(--text); }
.foot { display: flex; align-items: center; gap: 6px; padding: 10px 14px 12px; border-top: 1px solid var(--hairline); }
.foot-btn { display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 12px;
  border-radius: 8px; border: none; background: var(--chip); color: var(--text-2);
  font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background .14s, color .14s, filter .14s; }
.foot-btn:hover { background: var(--chip-hover); color: var(--text); }
.foot-btn.primary { background: var(--accent); color: #fff; }
.foot-btn.primary:hover { filter: brightness(1.08); }
.foot-btn.danger:hover { background: rgba(255,90,90,.16); color: #ff8f8f; }
.foot-spacer { flex: 1; }
.coll-count { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; font-weight: 500; }

/* segmented toggle 分类/最近 */
.seg-toggle { display: flex; gap: 3px; padding: 3px; border-radius: 9px; background: var(--chip); flex: none; }
.seg { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-family: inherit;
  padding: 4px 10px; border-radius: 7px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.seg:hover { color: var(--text); }
.seg[data-on="true"] { background: var(--accent); color: #fff; }

/* search box */
.coll-search { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 9px;
  background: var(--chip); color: var(--text-3); }
.coll-search.flat { flex: 1; }
.coll-search input { border: none; background: transparent; outline: none; font-family: inherit;
  font-size: 13px; color: var(--text); flex: 1; min-width: 0; }
.coll-search input::placeholder { color: var(--text-3); }

/* type filter chips */
.coll-filter { font-size: 12px; padding: 4px 11px; border-radius: 7px; border: none;
  background: var(--chip); color: var(--text-2); cursor: pointer; font-family: inherit; transition: all .14s; }
.coll-filter:hover { background: var(--chip-hover); color: var(--text); }
.coll-filter[data-active="true"] { background: var(--accent); color: #fff; }

/* empty state */
.coll-empty { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 56px 24px; color: var(--text-3); text-align: center; }
.coll-empty-title { font-size: 14px; font-weight: 600; color: var(--text-2); margin-top: 4px; }
.coll-empty-sub { font-size: 12px; }

/* =========================================================
   TYPE TAG + per-type dot/stripe
   ========================================================= */
.c-tag { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
  background: var(--accent-weak); color: var(--accent-text); flex: none;
  font-family: -apple-system, "PingFang SC", sans-serif; letter-spacing: .02em; }
.c-tag[data-type="短语"] { background: rgba(110,139,255,.18); color: #aab6ff; }
.c-tag[data-type="句型"] { background: rgba(138,125,255,.18); color: #c0b6ff; }
.c-tag[data-type="例句"] { background: rgba(79,184,201,.18); color: #8fdce8; }
.c-tag[data-type="英文"] { background: rgba(224,145,92,.18); color: #f0b88c; }
.c-tag[data-type="文本"] { background: rgba(154,160,173,.18); color: #c4cad4; }
.dot[data-type], .c-stripe[data-type] { background: var(--text-3); }
[data-type="短语"].dot, [data-type="短语"].c-stripe { background: var(--t-phrase); }
[data-type="句型"].dot, [data-type="句型"].c-stripe { background: var(--t-pattern); }
[data-type="例句"].dot, [data-type="例句"].c-stripe { background: var(--t-example); }
[data-type="英文"].dot, [data-type="英文"].c-stripe { background: var(--t-rewrite); }
[data-type="文本"].dot, [data-type="文本"].c-stripe { background: var(--t-text); }

/* =========================================================
   CARD (shared, 5 type bodies)
   ========================================================= */
.c-card { position: relative; padding: 11px 12px 11px 14px; border-radius: 12px; cursor: pointer;
  transition: background .14s; overflow: hidden; }
.c-card:hover { background: var(--chip); }
.c-card[data-selected="true"] { background: var(--accent-weak); box-shadow: inset 0 0 0 1px rgba(110,139,255,.4); }
.c-stripe { position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 0 3px 3px 0; opacity: .85; }
.c-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.c-src { font-size: 11px; color: var(--text-3); margin-left: auto; }

/* card bodies */
.cb { font-family: var(--read); }
.cb-gloss { font-size: 12.5px; color: var(--text-2); margin-top: 3px; }
.cb-phrase-line { display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
.ph-word { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); }
.ph-ipa { font-size: 12px; color: var(--accent-text); }
.cb-pattern .pt-text { font-family: var(--mono); font-size: 14px; color: var(--text); line-height: 1.5; }
.cb-pattern .ph { color: var(--accent-text); background: var(--accent-weak); padding: 0 4px; border-radius: 4px; font-style: normal; }
.cb-example .ex-sentence { font-size: 14px; color: var(--text); line-height: 1.55; }
.cb-example em { color: var(--accent-text); font-style: normal; font-weight: 600; }
.cb-rewrite .rw-en { font-size: 14px; color: var(--text); line-height: 1.5; }
.cb-rewrite .rw-origin { font-size: 12.5px; color: var(--text-2); margin-top: 5px; padding-left: 9px; border-left: 2px solid var(--hairline-strong); }
.cb-rewrite .rw-origin-toggle { margin-top: 5px; display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; color: var(--text-3); background: none; border: none; cursor: pointer; font-family: inherit; padding: 0; }
.cb-rewrite .rw-origin-toggle:hover { color: var(--accent-text); }
.cb-text .tx-excerpt { font-size: 13.5px; color: var(--text); line-height: 1.6; }
.cb-text[data-lang="en"] .tx-excerpt { font-family: var(--read); }

/* hover actions */
.c-actions { position: absolute; right: 9px; top: 9px; display: flex; gap: 2px;
  opacity: 0; transform: translateY(-2px); transition: opacity .14s, transform .14s;
  background: var(--glass-2); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: 8px; padding: 2px; }
.c-card:hover .c-actions { opacity: 1; transform: none; }
.c-actbtn { width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent;
  color: var(--text-2); display: grid; place-items: center; cursor: pointer; transition: background .12s, color .12s; }
.c-actbtn:hover { background: var(--chip-hover); color: var(--text); }
.c-actbtn.danger:hover { background: rgba(255,90,90,.18); color: #ff8f8f; }

/* =========================================================
   A — COMPACT 浮窗
   ========================================================= */
.collwin.compact { position: absolute; top: 92px; right: 56px; width: 392px;
  max-height: calc(100vh - 180px);
  border-radius: var(--radius); background: var(--glass);
  backdrop-filter: blur(28px) saturate(150%); -webkit-backdrop-filter: blur(28px) saturate(150%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline);
  display: flex; flex-direction: column; overflow: hidden; animation: win-in .26s var(--ease); }
.coll-head { display: flex; align-items: center; gap: 9px; padding: 14px 14px 10px; }
.coll-title { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.collwin.compact .coll-search { margin: 0 14px 10px; }
.coll-filters { display: flex; gap: 6px; padding: 0 14px 10px; flex-wrap: wrap; }
.coll-list { overflow: auto; padding: 0 8px 12px; display: flex; flex-direction: column; gap: 1px; }

/* =========================================================
   B — SPLIT 双栏
   ========================================================= */
.splitwin { position: absolute; top: 86px; left: 50%; transform: translateX(-50%); width: 640px;
  height: calc(100vh - 150px); max-height: 660px;
  border-radius: var(--radius); background: var(--glass);
  backdrop-filter: blur(30px) saturate(155%); -webkit-backdrop-filter: blur(30px) saturate(155%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline);
  display: flex; overflow: hidden; animation: win-in .26s var(--ease); }
.split-side { width: 188px; flex: none; border-right: 1px solid var(--hairline); padding: 14px 10px;
  display: flex; flex-direction: column; gap: 2px; overflow: auto; }
.split-brand { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; padding: 2px 8px 12px; }
.split-nav-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  color: var(--text-3); padding: 12px 8px 5px; }
.split-navitem { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 9px;
  border: none; background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit;
  font-size: 13.5px; text-align: left; transition: background .12s, color .12s; }
.split-navitem:hover { background: var(--chip); color: var(--text); }
.split-navitem[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); font-weight: 600; }
.split-navitem .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.split-navitem .n { margin-left: auto; font-size: 11.5px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.split-navitem[data-active="true"] .n { color: var(--accent-text); }
.split-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.split-toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--hairline); }
.split-scroll { overflow: auto; padding: 8px; flex: 1; }
.coll-group { margin-bottom: 10px; }
.coll-group-head { display: flex; align-items: center; gap: 8px; padding: 8px 8px 4px; position: sticky; top: 0;
  background: linear-gradient(var(--glass), var(--glass) 70%, transparent); backdrop-filter: blur(8px); z-index: 1; }
.coll-group-n { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }

/* =========================================================
   C — LIBRARY 大库
   ========================================================= */
.libwin { position: absolute; top: 96px; left: 50%; transform: translateX(-50%); width: 980px;
  max-width: calc(100vw - 64px); height: calc(100vh - 150px); max-height: 760px;
  border-radius: 18px; background: var(--glass);
  backdrop-filter: blur(34px) saturate(160%); -webkit-backdrop-filter: blur(34px) saturate(160%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline);
  display: flex; overflow: hidden; animation: win-in .28s var(--ease); }
.lib-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.lib-head { display: flex; align-items: center; gap: 14px; padding: 16px 18px 12px; }
.lib-title { font-size: 18px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 9px; flex: none; }
.lib-search { display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-radius: 10px;
  background: var(--chip); color: var(--text-3); flex: 1; max-width: 340px; }
.lib-search input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 13.5px; color: var(--text); flex: 1; min-width: 0; }
.lib-search input::placeholder { color: var(--text-3); }
.lib-head .seg-toggle { margin-left: auto; }
.lib-filters { display: flex; gap: 7px; padding: 0 18px 12px; flex-wrap: wrap; border-bottom: 1px solid var(--hairline); }
.lib-scroll { overflow: auto; padding: 14px 18px 22px; flex: 1; }
.lib-section { margin-bottom: 22px; }
.lib-section-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.lib-section-en { font-size: 12px; color: var(--text-3); font-family: var(--mono); }
.lib-section-n { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; margin-left: auto; }
.lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.libwin[data-detail="true"] .lib-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
.lib-grid .c-card { background: var(--chip); }
.lib-grid .c-card:hover { background: var(--chip-hover); }
.lib-grid .c-card[data-selected="true"] { background: var(--accent-weak); }

/* detail drawer */
.c-detail { width: 360px; flex: none; border-left: 1px solid var(--hairline);
  display: flex; flex-direction: column; background: rgba(255,255,255,.022);
  animation: drawer-in .24s var(--ease); }
@keyframes drawer-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
.c-detail-head { display: flex; align-items: center; gap: 9px; padding: 16px 16px 12px; border-bottom: 1px solid var(--hairline); }
.c-detail-sub { font-size: 11.5px; color: var(--text-3); }
.c-detail-body { overflow: auto; padding: 16px; flex: 1; }
.c-detail-main { font-size: 17px; line-height: 1.5; color: var(--text); font-family: var(--read); }
.c-detail-main .ph { color: var(--accent-text); background: var(--accent-weak); padding: 0 4px; border-radius: 4px; }
.c-detail-main em { color: var(--accent-text); font-style: normal; font-weight: 600; }
.c-detail-ipa { font-size: 13px; color: var(--accent-text); margin-top: 6px; font-family: var(--mono); }
.c-detail-meta { font-size: 13px; color: var(--text-2); margin-top: 8px; }
.c-detail-field { margin-top: 18px; }
.c-detail-label { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
.c-detail-value { font-size: 13.5px; color: var(--text); line-height: 1.55; }
.c-detail-src { display: inline-flex; align-items: center; gap: 5px; color: var(--accent-text); }
.c-detail-related { display: flex; flex-direction: column; gap: 6px; }
.c-related-item { font-size: 12.5px; color: var(--text-2); padding: 8px 10px; border-radius: 8px;
  background: var(--chip); cursor: pointer; transition: background .12s, color .12s; line-height: 1.45; }
.c-related-item:hover { background: var(--chip-hover); color: var(--text); }
.c-detail-foot { display: flex; align-items: center; gap: 6px; padding: 12px 14px; border-top: 1px solid var(--hairline); }

/* =========================================================
   MODEL/FORM SWITCHER (top)
   ========================================================= */
.mswitch { position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; padding: 5px; border-radius: 15px; background: rgba(16,17,22,.74);
  backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
  box-shadow: 0 12px 32px -8px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.07); z-index: 41; }
.ms-opt { display: flex; flex-direction: column; gap: 2px; padding: 8px 16px; border-radius: 11px;
  border: none; background: transparent; color: rgba(255,255,255,.6); cursor: pointer;
  font-family: inherit; text-align: left; transition: background .15s, color .15s; min-width: 132px; }
.ms-opt:hover { background: rgba(255,255,255,.07); color: #fff; }
.ms-opt[data-active="true"] { background: rgba(255,255,255,.13); color: #fff; }
.ms-opt .nm { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 7px; }
.ms-opt .nm .idx { font-family: var(--mono); font-size: 10px; opacity: .55; }
.ms-opt .ds { font-size: 10.5px; opacity: .62; line-height: 1.25; }

/* =========================================================
   RELAUNCH — 重新唤起 Lingobar
   直接复用 lingobar-fresh 的选区面板（lb-* 类 + 同款 token）。
   ========================================================= */
.relaunch-scrim { position: absolute; inset: 0; background: rgba(0,0,0,.32); z-index: 44; animation: fade-in .18s; }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

/* lingobar-fresh tokens (Tahoe glass scheme) scoped to the relaunch layer */
.lb {
  --lb-radius: 18px; --lb-radius-inner: 12px; --lb-pad: 14px;
  --lb-font-read: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --lb-ease: cubic-bezier(.22,.61,.36,1);
  --bg: rgba(245,247,250,.62); --panel: rgba(255,255,255,.5);
  --hairline: rgba(0,0,0,.08); --hairline-strong: rgba(0,0,0,.12);
  --text: rgba(20,22,28,.92); --text-2: rgba(40,44,52,.62); --text-3: rgba(40,44,52,.42);
  --accent: #0a84ff; --accent-weak: rgba(10,132,255,.12); --accent-text: #0a6fe0;
  --chip: rgba(0,0,0,.045); --chip-hover: rgba(0,0,0,.075);
  --lb-shadow: 0 1px 2px rgba(0,0,0,.10), 0 18px 48px -12px rgba(20,30,60,.34);
  --blur: 36px; --sat: 180%;
  --bar-font: var(--lb-font-read); --read-font: var(--lb-font-read);
}
.lb {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
  width: 640px; z-index: 45; display: flex; flex-direction: column; gap: 8px;
  animation: lb-in .24s var(--lb-ease);
}
.lb-surface { border-radius: var(--lb-radius); background: var(--bg);
  backdrop-filter: blur(var(--blur)) saturate(var(--sat)); -webkit-backdrop-filter: blur(var(--blur)) saturate(var(--sat));
  box-shadow: var(--lb-shadow); border: 1px solid var(--hairline); }
@keyframes lb-in { from { opacity: 0; transform: translate(-50%,-50%) translateY(6px) scale(.985); } to { opacity: 1; transform: translate(-50%,-50%); } }

.lb-pill { display: flex; align-items: center; gap: 10px; padding: 7px 8px 7px 15px; }
.lb-src { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 9px; }
.lb-src-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-3); flex: none; }
.lb-src-dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; }
.lb-src-text { font-size: 13px; color: var(--text-2); line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.lb-iconbtn { flex: none; width: 26px; height: 26px; border-radius: 7px; border: none; background: transparent;
  color: var(--text-3); display: grid; place-items: center; cursor: pointer; transition: background .14s, color .14s; }
.lb-iconbtn:hover { background: var(--chip-hover); color: var(--text); }
.lb-tools { display: flex; align-items: center; gap: 1px; flex: none; padding: 2px; border-radius: 9px; background: var(--chip); }
.lb-tools .lb-iconbtn { width: 24px; height: 24px; }

.lb-actionbar { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
.lb-act { font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 9px; border: 1px solid var(--hairline);
  background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
  transition: background .14s, color .14s, border-color .14s; }
.lb-act:hover { background: var(--chip); color: var(--text); }
.lb-act[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.lb-act[data-disabled="true"] { opacity: .38; cursor: not-allowed; pointer-events: none; }

.lb-panel { overflow: hidden; }
.lb-panel-title { display: flex; align-items: center; gap: 8px; padding: 13px var(--lb-pad) 4px; font-size: 12px; font-weight: 600; color: var(--text-2); letter-spacing: .01em; }
.lb-panel-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.lb-panel-body { padding: 6px var(--lb-pad) 14px; font-family: var(--read-font); min-height: 176px; font-size: 15px; overflow: auto; max-height: 52vh; }
.lb-panel-body .tr-gloss, .lb-panel-body .rw-primary { font-size: 16.5px; }

.lb-ctrlbar { display: flex; align-items: center; gap: 16px; padding: 9px var(--lb-pad); border-top: 1px solid var(--hairline); background: var(--panel); flex-wrap: wrap; }
.lb-ctrl-group { display: flex; align-items: center; gap: 7px; }
.lb-ctrl-group .lbl { font-size: 11px; color: var(--text-3); flex: none; }
.lb-ctrl-chips { display: flex; gap: 5px; }
.lb-ctrl-chip { font-size: 12px; padding: 4px 10px; border-radius: 7px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; transition: background .14s, color .14s, border-color .14s; }
.lb-ctrl-chip:hover { background: var(--chip); color: var(--text); }
.lb-ctrl-chip[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.lb-ctrl-spacer { flex: 1; min-width: 12px; }
.lb-ctrl-more { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 13px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 12.5px; font-weight: 600; font-family: inherit; cursor: pointer; transition: filter .14s; flex: none; }
.lb-ctrl-more:hover { filter: brightness(1.08); }

/* translate body */
.tr-gloss { font-size: 16px; color: var(--text); line-height: 1.74; }
.tr-key { margin-top: 11px; padding: 9px 11px; border-radius: var(--lb-radius-inner); background: var(--chip); display: flex; align-items: baseline; gap: 9px; flex-wrap: wrap; }
.tr-key .k { font-family: var(--bar-font); font-weight: 600; color: var(--accent-text); font-size: 14px; }
.tr-key .kz { color: var(--text-2); font-size: 13px; }
.tr-note { margin-top: 8px; font-size: 12.5px; color: var(--text-3); line-height: 1.65; }

/* grammar body */
.gr-block { display: grid; grid-template-columns: 56px 1fr; gap: 10px; padding: 7px 0; border-bottom: 1px dashed var(--hairline); }
.gr-block:last-of-type { border-bottom: none; }
.gr-role { font-size: 11px; font-weight: 600; color: var(--accent-text); font-family: -apple-system, "PingFang SC", sans-serif; padding-top: 2px; }
.gr-text { font-family: var(--bar-font); font-size: 13.5px; color: var(--text); }
.gr-text .ph { color: var(--accent-text); background: var(--accent-weak); padding: 0 4px; border-radius: 4px; }
.gr-hint { font-size: 11.5px; color: var(--text-3); margin-top: 2px; font-family: -apple-system, "PingFang SC", sans-serif; }
.gr-pattern { margin-top: 11px; padding: 10px 12px; border-radius: var(--lb-radius-inner); background: var(--accent-weak); }
.gr-pattern .lbl { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--accent-text); }
.gr-pattern .pt { font-family: var(--bar-font); font-size: 13.5px; color: var(--text); margin-top: 4px; }
.gr-pattern .pt .ph { color: var(--accent-text); background: rgba(10,132,255,.14); padding: 0 4px; border-radius: 4px; }
.gr-pattern .ptz { font-size: 12px; color: var(--text-2); margin-top: 2px; }

/* rewrite body */
.rw-primary { font-size: 16px; line-height: 1.6; color: var(--text); padding: 11px 12px; border-radius: var(--lb-radius-inner); background: var(--accent-weak); border: 1px solid var(--hairline); font-family: var(--read-font); }
.rw-var { display: flex; gap: 10px; align-items: flex-start; padding: 9px 2px; border-bottom: 1px solid var(--hairline); }
.rw-var:last-child { border-bottom: none; }
.rw-tone { flex: none; font-size: 11px; font-weight: 600; color: var(--accent-text); background: var(--chip); padding: 2px 7px; border-radius: 6px; font-family: -apple-system, "PingFang SC", sans-serif; margin-top: 2px; }
.rw-var-text { font-size: 14px; line-height: 1.55; color: var(--text-2); }

/* examples body */
.ex-lead { font-size: 11.5px; color: var(--text-3); margin-bottom: 7px; font-family: -apple-system, "PingFang SC", sans-serif; }
.ex-item { display: flex; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--hairline); font-size: 14px; line-height: 1.55; color: var(--text); }
.ex-item:last-child { border-bottom: none; }
.ex-item .n { flex: none; width: 18px; height: 18px; border-radius: 50%; background: var(--chip); color: var(--text-3); display: grid; place-items: center; font-size: 10px; font-weight: 600; font-family: -apple-system, sans-serif; margin-top: 2px; }
.ex-item em { color: var(--accent-text); font-style: normal; font-weight: 600; }

/* pronounce body */
.pr-wrap { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
.pr-play { flex: none; width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--accent); color: #fff;
  display: grid; place-items: center; cursor: pointer; box-shadow: 0 6px 16px -4px var(--accent); transition: transform .12s; }
.pr-play:active { transform: scale(.92); }
.pr-word { font-family: var(--bar-font); font-size: 19px; font-weight: 600; color: var(--text); }
.pr-ipa { font-size: 14px; color: var(--accent-text); }
.pr-syll { display: flex; gap: 5px; margin-top: 6px; }
.pr-syll span { font-size: 12px; padding: 2px 8px; border-radius: 6px; background: var(--chip); color: var(--text-2); font-family: var(--bar-font); }
.pr-syll span[data-stress="true"] { background: var(--accent-weak); color: var(--accent-text); font-weight: 600; }
.pr-stress { font-size: 11.5px; color: var(--text-3); margin-top: 8px; font-family: -apple-system, "PingFang SC", sans-serif; }

/* footer */
.lb-foot { display: flex; align-items: center; gap: 4px; padding: 8px 14px 12px; }
.lb-foot-btn { display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 11px; border-radius: 8px; border: none;
  background: var(--chip); color: var(--text-2); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background .14s, color .14s; }
.lb-foot-btn:hover { background: var(--chip-hover); color: var(--text); }
.lb-foot-spacer { flex: 1; }

/* toast */
.toast { position: absolute; left: 50%; bottom: 64px; transform: translateX(-50%);
  display: flex; align-items: center; gap: 7px; padding: 8px 15px; border-radius: 9px;
  background: #fff; color: #1a1a1f; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: toast-in .2s var(--ease); z-index: 50; pointer-events: none; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%,8px); } to { opacity: 1; transform: translate(-50%,0); } }

@keyframes win-in { from { opacity: 0; transform: translate(-50%, 0) translateY(8px) scale(.99); }
  to { opacity: 1; } }
.collwin.compact { animation: pop-in .26s var(--ease); }
@keyframes pop-in { from { opacity: 0; transform: translateY(8px) scale(.99); } to { opacity: 1; transform: none; } }
/* splitwin / libwin are centered with translateX; override win-in to keep centering */
.splitwin, .libwin { animation: center-in .26s var(--ease); }
@keyframes center-in { from { opacity: 0; } to { opacity: 1; } }

/* bottom helper */
.helper { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px; font-size: 11.5px; color: rgba(255,255,255,.5); z-index: 30; }
.helper b { color: rgba(255,255,255,.78); font-weight: 600; }
.helper svg { vertical-align: -1px; }
</style>
