<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lingobar — 句子结构拆解</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Lingobar 句子结构拆解 — "温暖阅读" scheme (reader).
   Floating-layer tokens lifted from the existing prototype's reader
   scheme so this lives in the same product, just a deeper 语法 view.
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #f0eee9;
  color: #2e2620;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { min-height: 100vh; }
:lang(zh) { line-height: 1.78; }
:lang(en) { line-height: 1.55; }

/* ---- reader-scheme layer tokens ---- */
[data-scheme="reader"] {
  --lb-radius: 18px;
  --lb-radius-inner: 12px;
  --lb-pad: 16px;
  --bg: rgba(250,246,239,.92);
  --bg-solid: #faf6ef;
  --panel: rgba(255,253,249,.7);
  --hairline: rgba(80,60,40,.12);
  --hairline-strong: rgba(80,60,40,.2);
  --text: #2e2620;
  --text-2: rgba(60,48,38,.66);
  --text-3: rgba(60,48,38,.45);
  --accent: #c0673c;
  --accent-weak: rgba(192,103,60,.13);
  --accent-text: #a8511f;
  --chip: rgba(120,80,40,.06);
  --chip-hover: rgba(120,80,40,.1);
  --shadow: 0 1px 2px rgba(60,40,20,.1), 0 20px 50px -14px rgba(80,50,20,.34);
  --blur: 18px;
  --read-font: "Newsreader", "Songti SC", "Noto Serif SC", Georgia, serif;
  --bar-font: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --lb-ease: cubic-bezier(.22,.61,.36,1);
}

/* warm desktop backdrop inside each artboard */
.a-backdrop { position: relative; width: 100%; height: 100%; padding: 26px; display: flex; justify-content: center; }
.a-wall {
  position: absolute; inset: 0;
  background:
    radial-gradient(130% 120% at 18% 6%, #d8c4a8 0%, #c8ad8c 36%, #b89876 64%, #9c7e5e 100%);
}
.a-wall::after {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(46% 46% at 82% 14%, rgba(255,220,170,.55), transparent 70%),
    radial-gradient(46% 52% at 88% 94%, rgba(180,130,90,.4), transparent 70%);
  mix-blend-mode: screen;
}

/* =====================================================================
   FLOATING LAYER
   ===================================================================== */
.lb { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 8px; color: var(--text); width: 100%; }
.lb.split { max-width: 700px; }
.lb.stack { max-width: 416px; }
.lb.minimal { max-width: 388px; }
.lb-surface {
  border-radius: var(--lb-radius); background: var(--bg);
  backdrop-filter: blur(var(--blur)) saturate(150%); -webkit-backdrop-filter: blur(var(--blur)) saturate(150%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline);
}

/* pill */
.lb-pill { display: flex; align-items: center; gap: 10px; padding: 7px 8px 7px 15px; }
.lb-src { flex: 1; min-width: 0; }
.lb-src-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-3); }
.lb-src-dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; }
.lb-iconbtn { flex: none; width: 26px; height: 26px; border-radius: 7px; border: none; background: transparent; color: var(--text-3); display: grid; place-items: center; cursor: pointer; transition: background .14s, color .14s; }
.lb-iconbtn:hover { background: var(--chip-hover); color: var(--text); }
.lb-tools { display: flex; align-items: center; gap: 1px; flex: none; padding: 2px; border-radius: 9px; background: var(--chip); }
.lb-tools .lb-iconbtn { width: 24px; height: 24px; }

/* panel */
.lb-panel { overflow: hidden; }

/* action bar */
.lb-actionbar { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 16px; border-bottom: 1px solid var(--hairline); }
.lb-act { font-size: 13px; font-weight: 500; padding: 7px 13px; border-radius: 9px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; transition: background .14s, color .14s; }
.lb-act:hover { background: var(--chip); color: var(--text); }
.lb-act[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }

/* sentence + translation */
.g-sentence { padding: 14px var(--lb-pad) 12px; border-bottom: 1px solid var(--hairline); }
.g-sentence-en { font-family: var(--read-font); font-size: 18.5px; line-height: 1.5; color: var(--text); letter-spacing: -.005em; }
.g-sentence-row { display: flex; align-items: flex-start; gap: 9px; margin-top: 9px; }
.g-readbtn { flex: none; width: 26px; height: 26px; border-radius: 50%; border: none; background: var(--accent-weak); color: var(--accent-text); display: grid; place-items: center; cursor: pointer; margin-top: 1px; transition: filter .14s; }
.g-readbtn:hover { filter: brightness(.96); }
.g-sentence-zh { font-size: 14px; color: var(--text-2); line-height: 1.7; }

/* viz head: title + reco + view toggle */
.g-vizhead { display: flex; align-items: center; gap: 9px; padding: 13px var(--lb-pad) 9px; flex-wrap: wrap; }
.g-vizhead-title { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--text); }
.g-vizhead-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.g-reco { display: inline-flex; align-items: center; gap: 3px; font-size: 10.5px; color: var(--text-3); padding: 2px 7px; border-radius: 6px; background: var(--chip); cursor: default; }
.g-segment { display: flex; gap: 2px; padding: 2px; border-radius: 9px; background: var(--chip); flex: none; }
.g-seg { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 7px; border: none; background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; transition: background .14s, color .14s; }
.g-seg[data-active="true"] { background: var(--bg-solid); color: var(--accent-text); font-weight: 600; box-shadow: 0 1px 3px rgba(60,40,20,.12); }

/* =====================================================================
   CHART VIEW — colour blocks + relation arcs
   ===================================================================== */
.g-legend { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 var(--lb-pad) 4px; }
.g-legend-item { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); padding: 3px 8px; border-radius: 7px; border: none; background: transparent; cursor: pointer; font-family: inherit; transition: opacity .14s, background .14s; }
.g-legend-item:hover { background: var(--chip); }
.g-legend-item[data-dim="true"] { opacity: .32; }
.g-legend-dot { width: 9px; height: 9px; border-radius: 3px; }

.g-vizbox { padding: 6px var(--lb-pad) 4px; }
.g-chart { position: relative; padding-bottom: 56px; }
.g-arcs { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.g-blockrow { position: relative; z-index: 1; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 8px 7px; }

.g-block {
  position: relative; display: inline-flex; flex-direction: column; align-items: flex-start; gap: 3px;
  padding: 7px 11px; border-radius: 11px; border: 1px solid var(--c);
  background: var(--tint); cursor: pointer; font-family: inherit; text-align: left;
  transition: transform .14s var(--lb-ease), opacity .14s, box-shadow .14s;
}
.g-block:hover { transform: translateY(-1px); box-shadow: 0 4px 14px -6px var(--c); }
.g-block[data-dim="true"] { opacity: .3; }
.g-block.is-sm { padding: 5px 9px; }
.g-block.is-phrase { border-style: dashed; }
.g-block-word { font-family: var(--read-font); font-size: 16px; color: var(--text); line-height: 1.3; }
.g-block.is-sm .g-block-word { font-size: 14.5px; }
.g-block-tag { display: inline-flex; align-items: baseline; gap: 5px; font-size: 10.5px; font-weight: 700; color: #fff; background: var(--c); padding: 1px 7px; border-radius: 5px; letter-spacing: .02em; }
.g-block-tag-easy { font-weight: 500; font-size: 9.5px; opacity: .82; }

/* embedded clause "画板" */
.g-clausepanel { position: relative; display: flex; flex-direction: column; gap: 7px; padding: 9px 10px 10px; border-radius: 13px; background: rgba(120,100,72,.10); border: 1px dashed rgba(120,100,72,.4); transition: opacity .14s; }
.g-clausepanel[data-dim="true"] { opacity: .32; }
.g-clausepanel-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 600; color: #6f6355; }
.g-clausepanel-conj { font-family: var(--read-font); font-style: italic; font-size: 13px; color: #6f6355; padding: 1px 7px; border-radius: 5px; background: rgba(120,100,72,.14); }
.g-clausepanel-inner { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 7px; }

/* =====================================================================
   TREE VIEW
   ===================================================================== */
.g-tree { padding: 8px var(--lb-pad) 6px; }
.g-tnode { position: relative; }
.g-tchildren { margin-left: 16px; padding-left: 14px; border-left: 1.5px solid var(--hairline); }
.g-trow {
  position: relative; display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 9px;
  padding: 8px 10px; margin: 4px 0; border-radius: 10px; cursor: pointer;
  transition: opacity .14s, background .14s;
}
.g-trow:hover { background: color-mix(in srgb, var(--c) 14%, transparent); }
.g-trow[data-dim="true"] { opacity: .34; }
.g-trail { position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: var(--c); }
.g-tlabel { display: inline-flex; align-items: baseline; gap: 6px; font-size: 12px; font-weight: 700; color: var(--ct); padding-left: 8px; }
.g-tlabel-en { font-size: 10px; font-weight: 500; color: var(--text-3); }
.g-ttext { font-family: var(--read-font); font-size: 14.5px; color: var(--text); }
.g-tzh { font-size: 11.5px; color: var(--text-3); }

/* =====================================================================
   INSIGHT CARDS
   ===================================================================== */
.g-cards { display: grid; gap: 8px; padding: 10px var(--lb-pad) 4px; }
.split .g-splitrail .g-cards { padding: 0 0 8px; }
.g-card { padding: 10px 12px; border-radius: var(--lb-radius-inner); background: var(--bg-solid); border: 1px solid var(--hairline); border-left: 3px solid var(--c); transition: opacity .14s, box-shadow .14s; }
.g-card:hover { box-shadow: 0 4px 14px -8px var(--c); }
.g-card[data-dim="true"] { opacity: .4; }
.g-card-head { display: flex; align-items: center; gap: 7px; }
.g-card-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c); }
.g-card-tag { font-size: 11.5px; font-weight: 700; color: var(--ct); }
.g-card-tagen { font-size: 10px; color: var(--text-3); }
.g-card-title { font-family: var(--read-font); font-size: 15px; font-weight: 600; color: var(--text); margin: 4px 0 3px; }
.g-card-body { font-size: 12.5px; line-height: 1.7; color: var(--text-2); }
.g-card-body :lang(en), .g-card-title :lang(en) { font-family: var(--read-font); }

/* phrase highlights */
.g-phrases { display: flex; flex-wrap: wrap; align-items: center; gap: 7px; padding: 10px var(--lb-pad) 4px; }
.split .g-splitrail .g-phrases { padding: 4px 0 0; }
.g-phrases-lbl { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-3); flex: none; }
.g-phrase { display: inline-flex; align-items: baseline; gap: 6px; padding: 4px 9px; border-radius: 8px; border: 1px solid var(--hairline); background: transparent; cursor: pointer; font-family: inherit; transition: opacity .14s, background .14s; }
.g-phrase:hover { background: var(--chip); }
.g-phrase[data-dim="true"] { opacity: .34; }
.g-phrase span:first-child { font-family: var(--read-font); font-size: 13px; color: var(--accent-text); font-weight: 500; }
.g-phrase-zh { font-size: 11px; color: var(--text-3); }

/* reusable pattern */
.g-pattern { margin: 10px var(--lb-pad) 2px; padding: 10px 12px; border-radius: var(--lb-radius-inner); background: var(--accent-weak); }
.g-pattern-lbl { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--accent-text); text-transform: uppercase; }
.g-pattern-en { font-family: var(--read-font); font-size: 14.5px; color: var(--text); margin-top: 4px; }
.g-pattern-zh { font-size: 12px; color: var(--text-2); margin-top: 2px; }

/* split layout */
.g-splitbody { display: grid; grid-template-columns: 1.35fr 1fr; gap: 4px; }
.g-splitviz { border-right: 1px solid var(--hairline); padding-bottom: 6px; }
.g-splitrail { padding: 10px var(--lb-pad) 4px; display: flex; flex-direction: column; gap: 8px; }

/* control bar */
.lb-ctrlbar { display: flex; align-items: center; gap: 16px; padding: 9px var(--lb-pad); border-top: 1px solid var(--hairline); background: var(--panel); flex-wrap: wrap; }
.lb-ctrl-group { display: flex; align-items: center; gap: 7px; }
.lb-ctrl-group .lbl { font-size: 11px; color: var(--text-3); flex: none; }
.lb-ctrl-chips { display: flex; gap: 5px; }
.lb-ctrl-chip { font-size: 12px; padding: 4px 11px; border-radius: 7px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; transition: background .14s, color .14s, border-color .14s; }
.lb-ctrl-chip:hover { background: var(--chip); color: var(--text); }
.lb-ctrl-chip[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.lb-ctrl-spacer { flex: 1; min-width: 8px; }
.lb-ctrl-more { display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 12px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: filter .14s; flex: none; }
.lb-ctrl-more:hover { filter: brightness(1.06); }

/* label toggle switch */
.g-switch { display: inline-flex; align-items: center; gap: 6px; padding: 3px 5px 3px 8px; border-radius: 8px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; font-family: inherit; transition: color .14s, border-color .14s, background .14s; }
.g-switch[data-on="true"] { color: var(--accent-text); border-color: transparent; background: var(--accent-weak); }
.g-switch-track { width: 26px; height: 15px; border-radius: 8px; background: var(--hairline-strong); position: relative; transition: background .16s; }
.g-switch[data-on="true"] .g-switch-track { background: var(--accent); }
.g-switch-knob { position: absolute; top: 1.5px; left: 1.5px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: transform .16s var(--lb-ease); }
.g-switch[data-on="true"] .g-switch-knob { transform: translateX(11px); }

/* footer */
.lb-foot { display: flex; align-items: center; gap: 5px; padding: 9px 14px 12px; }
.lb-foot-spacer { flex: 1; }
.lb-foot-btn { display: inline-flex; align-items: center; gap: 5px; height: 30px; padding: 0 11px; border-radius: 8px; border: none; background: var(--chip); color: var(--text-2); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background .14s, color .14s, filter .14s; }
.lb-foot-btn:hover { background: var(--chip-hover); color: var(--text); }
.lb-foot-btn.primary { background: var(--accent); color: #fff; }
.lb-foot-btn.primary:hover { filter: brightness(1.06); }

/* minimal layout: hide easy-gloss on tags, keep it light for beginners */
.minimal .g-block-tag-easy { display: none; }

/* toast */
.lb-toast { position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%); display: flex; align-items: center; gap: 7px; padding: 6px 13px; border-radius: 9px; background: var(--text); color: var(--bg-solid); font-size: 12.5px; font-weight: 500; box-shadow: 0 8px 22px -6px rgba(0,0,0,.5); z-index: 30; pointer-events: none; animation: toast-in .2s var(--lb-ease); }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>
<div id="root"></div>
