<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingobar — 主窗口（收藏 · 历史 · 设置）</title>
<style>
/* ============================================================
   Lingobar 主窗口：收藏 | 历史 | 设置 三分区
   左导航 + 主区(列表/详情两栏)。深色玻璃单配色。
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #0d0e12; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
#root { height: 100vh; }

:root {
  --accent: #6e8bff; --accent-2: #8a7dff; --accent-text: #aab6ff; --accent-weak: rgba(110,139,255,.16);
  --glass: rgba(28,30,40,.82); --glass-2: rgba(40,43,56,.6);
  --hairline: rgba(255,255,255,.09); --hairline-strong: rgba(255,255,255,.15);
  --text: rgba(255,255,255,.95); --text-2: rgba(255,255,255,.6); --text-3: rgba(255,255,255,.38);
  --chip: rgba(255,255,255,.06); --chip-hover: rgba(255,255,255,.11); --black-field: rgba(0,0,0,.22);
  --ok: #4fd0a0; --warn: #e0915c;
  --shadow: 0 0 0 1px rgba(255,255,255,.06), 0 30px 70px -18px rgba(0,0,0,.75);
  --radius: 16px; --mono: "Space Grotesk", ui-monospace, "SF Mono", Menlo, monospace;
  --read: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --ease: cubic-bezier(.22,.61,.36,1);
}

/* stage */
.stage { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
.wallpaper { position: absolute; inset: 0; background: radial-gradient(130% 130% at 14% 6%, #2d3a66 0%, #232a4a 34%, #1a1d33 64%, #111322 100%); }
.wallpaper::after { content: ""; position: absolute; inset: 0; mix-blend-mode: screen;
  background: radial-gradient(38% 46% at 84% 12%, rgba(255,160,110,.3), transparent 70%),
    radial-gradient(48% 56% at 90% 94%, rgba(120,90,210,.38), transparent 70%),
    radial-gradient(30% 40% at 12% 92%, rgba(70,190,200,.2), transparent 70%); }
.menubar { position: absolute; top: 0; left: 0; right: 0; height: 26px; display: flex; align-items: center; gap: 18px;
  padding: 0 14px; font-size: 13px; color: rgba(255,255,255,.92); background: rgba(0,0,0,.2);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 5; }
.menubar .mb-app { font-weight: 600; } .menubar .mb-item { opacity: .8; }
.menubar .mb-right { margin-left: auto; display: flex; align-items: center; gap: 16px; opacity: .9; }
.menubar .mono { font-variant-numeric: tabular-nums; }

/* window */
.hubwin { position: absolute; top: 58px; left: 50%; transform: translateX(-50%); width: 920px;
  height: calc(100vh - 96px); max-height: 660px; display: flex; border-radius: var(--radius);
  background: var(--glass); backdrop-filter: blur(30px) saturate(155%); -webkit-backdrop-filter: blur(30px) saturate(155%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline); overflow: hidden;
  animation: win-in .28s var(--ease); }
@keyframes win-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%); } }

/* ---- left nav ---- */
.hub-side { width: 188px; flex: none; display: flex; flex-direction: column; border-right: 1px solid var(--hairline); background: rgba(0,0,0,.12); }
.hub-side-brand { display: flex; align-items: center; gap: 9px; padding: 16px 16px 12px; }
.hub-brand-logo { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-weak); color: var(--accent-text); display: grid; place-items: center; }
.hub-brand-name { font-size: 15px; font-weight: 600; }
.hub-side-nav { flex: 1; overflow-y: auto; padding: 6px 10px; }
.hub-navgroup { margin-bottom: 14px; }
.hub-navgroup-title { font-size: 10.5px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); padding: 4px 8px 7px; }
.hub-navitem { width: 100%; display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 10px; border: none;
  background: transparent; color: var(--text-2); cursor: pointer; text-align: left; transition: background .14s, color .14s; }
.hub-navitem:hover { background: var(--chip); color: var(--text); }
.hub-navitem[data-active="true"] { background: var(--accent-weak); color: var(--accent-text); }
.hub-navicon { width: 26px; height: 26px; border-radius: 7px; background: var(--chip); display: grid; place-items: center; flex: none; }
.hub-navitem[data-active="true"] .hub-navicon { background: rgba(110,139,255,.2); }
.hub-navtext { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
.hub-navname { font-size: 13.5px; font-weight: 600; }
.hub-navdesc { font-size: 10.5px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hub-navitem[data-active="true"] .hub-navdesc { color: rgba(170,182,255,.7); }
.hub-navcount { font-size: 10.5px; font-weight: 600; color: var(--text-3); background: var(--chip); padding: 1px 7px; border-radius: 8px; flex: none; font-variant-numeric: tabular-nums; }
.hub-navitem[data-active="true"] .hub-navcount { background: rgba(110,139,255,.22); color: var(--accent-text); }
.hub-side-foot { padding: 10px 14px 14px; border-top: 1px solid var(--hairline); }
.hub-gate { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 8px;
  background: rgba(224,145,92,.14); color: var(--warn); }
.hub-gate[data-ok] { background: rgba(79,208,160,.14); color: var(--ok); }

/* ---- main ---- */
.hub-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.hub-pane { display: flex; flex-direction: column; height: 100%; min-height: 0; }

/* pane head + toolbar */
.hub-pane-head { display: flex; align-items: center; gap: 14px; padding: 16px 20px 12px; border-bottom: 1px solid var(--hairline); flex: none; }
.hub-pane-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 9px; }
.hub-pane-count { font-size: 11px; font-weight: 600; color: var(--text-3); background: var(--chip); padding: 2px 8px; border-radius: 8px; font-variant-numeric: tabular-nums; }
.hub-search { margin-left: auto; display: flex; align-items: center; gap: 7px; padding: 6px 11px; border-radius: 9px; background: var(--chip-hover); border: 1px solid var(--hairline); color: var(--text-3); width: 220px; transition: border-color .14s; }
.hub-search:focus-within { border-color: var(--accent); }
.hub-search input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; font-family: inherit; }
.hub-search input::placeholder { color: var(--text-3); }

.hub-toolbar { display: flex; align-items: center; gap: 10px; padding: 11px 20px; border-bottom: 1px solid var(--hairline); flex: none; }
.hub-filterchips { display: flex; flex-wrap: wrap; gap: 6px; }
.hub-chip { font-size: 12px; font-weight: 500; font-family: inherit; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.hub-chip:hover { background: var(--chip); color: var(--text); }
.hub-chip[data-on] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.hub-clear { margin-left: auto; font-size: 12px; font-family: inherit; padding: 5px 11px; border-radius: 8px; border: none; background: var(--chip); color: var(--text-3); cursor: pointer; transition: all .14s; }
.hub-clear:hover { background: var(--chip-hover); color: var(--text-2); }

/* two columns */
.hub-twocol { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 320px; }
.hub-list { overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 9px; border-right: 1px solid var(--hairline); }
.hub-empty { text-align: center; color: var(--text-3); font-size: 13px; padding: 40px 0; }

/* item card */
.hub-card { padding: 12px 13px; border-radius: 12px; background: var(--chip); border: 1px solid var(--hairline); cursor: pointer; transition: background .14s, border-color .14s; }
.hub-card:hover { background: var(--chip-hover); }
.hub-card[data-selected] { border-color: var(--accent); background: var(--accent-weak); }
.hub-card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.hub-typetag { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 6px; color: var(--hue); background: color-mix(in srgb, var(--hue) 16%, transparent); }
.hub-actbadge { font-size: 10px; font-weight: 600; color: var(--text-2); background: var(--chip-hover); padding: 2px 7px; border-radius: 5px; }
.hub-savedmark { color: var(--accent-text); display: inline-grid; place-items: center; }
.hub-card-time { margin-left: auto; font-size: 10.5px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.hub-card-text { font-size: 14px; color: var(--text); line-height: 1.45; font-family: var(--read); word-break: break-word; }
.hub-card-text.is-pattern { font-family: var(--mono); font-size: 13px; }
.hub-slot { color: var(--accent-text); background: rgba(110,139,255,.13); padding: 0 4px; border-radius: 4px; font-style: normal; }
.hub-card-ipa { font-size: 11.5px; color: var(--text-3); font-family: var(--read); margin-top: 3px; }
.hub-card-meta { font-size: 12px; color: var(--text-2); margin-top: 5px; line-height: 1.5; }
.hub-card-foot { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.hub-card-src { display: inline-flex; align-items: center; gap: 4px; font-size: 10.5px; color: var(--text-3); }
.hub-card-acts { margin-left: auto; display: flex; gap: 3px; opacity: 0; transition: opacity .14s; }
.hub-card:hover .hub-card-acts, .hub-card[data-selected] .hub-card-acts { opacity: 1; }
.hub-iconbtn { width: 26px; height: 26px; border-radius: 7px; border: none; background: transparent; color: var(--text-3); display: grid; place-items: center; cursor: pointer; transition: background .14s, color .14s; }
.hub-iconbtn:hover { background: var(--chip-hover); color: var(--text); }
.hub-iconbtn.save:hover { color: var(--accent-text); }
.hub-iconbtn.danger:hover { background: rgba(224,92,92,.18); color: #ff8f8f; }

/* detail drawer */
.hub-detail { display: flex; flex-direction: column; min-height: 0; }
.hub-detail.empty { align-items: center; justify-content: center; }
.hub-detail-empty { text-align: center; color: var(--text-3); }
.hub-detail-empty svg { opacity: .4; } .hub-detail-empty p { font-size: 12.5px; margin-top: 10px; }
.hub-detail-head { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--hairline); flex: none; }
.hub-detail-tags { display: flex; gap: 7px; flex: 1; }
.hub-detail-body { flex: 1; overflow-y: auto; padding: 16px; }
.hub-detail-text { font-size: 16px; line-height: 1.5; color: var(--text); font-family: var(--read); word-break: break-word; }
.hub-detail-text.is-pattern { font-family: var(--mono); font-size: 14px; }
.hub-detail-ipa { font-size: 12.5px; color: var(--text-3); font-family: var(--read); margin-top: 6px; }
.hub-detail-row { margin-top: 18px; }
.hub-detail-lbl { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-3); display: block; margin-bottom: 6px; }
.hub-detail-val { font-size: 13px; color: var(--text-2); line-height: 1.6; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.hub-detail-collocs { display: flex; flex-wrap: wrap; gap: 6px; }
.hub-colloc { font-size: 12px; font-family: var(--read); color: var(--accent-text); background: rgba(110,139,255,.13); padding: 3px 9px; border-radius: 7px; }
.hub-detail-foot { display: flex; align-items: center; gap: 6px; padding: 12px 14px; border-top: 1px solid var(--hairline); flex: none; }
.hub-foot-btn { display: inline-flex; align-items: center; gap: 5px; height: 32px; padding: 0 12px; border-radius: 8px; border: none; background: var(--chip); color: var(--text-2); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .14s; }
.hub-foot-btn:hover { background: var(--chip-hover); color: var(--text); }
.hub-foot-btn.primary { background: var(--accent); color: #fff; }
.hub-foot-btn.primary:hover { filter: brightness(1.08); }
.hub-foot-btn.danger:hover { background: rgba(224,92,92,.18); color: #ff8f8f; }
.hub-foot-spacer { flex: 1; }

/* ---- settings ---- */
.hub-settings .hub-pane-head { flex-direction: column; align-items: stretch; gap: 12px; }
.hub-subnav { display: flex; gap: 6px; }
.hub-subnav-item { font-size: 12.5px; font-family: inherit; padding: 6px 13px; border-radius: 8px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.hub-subnav-item:hover { background: var(--chip); color: var(--text); }
.hub-subnav-item[data-on="true"] { background: var(--accent-weak); color: var(--accent-text); font-weight: 600; }
.hub-set-scroll { flex: 1; overflow-y: auto; padding: 18px 22px 26px; }
.hub-set-group { margin-bottom: 22px; }
.hub-set-grouptitle { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text-3); margin: 0 0 9px 2px; }
.hub-set-grouptitle:not(:first-child) { margin-top: 18px; }
.hub-set-card { border-radius: 12px; background: var(--chip); overflow: hidden; }
.hub-set-row { display: flex; align-items: center; gap: 16px; padding: 13px 15px; border-bottom: 1px solid var(--hairline); }
.hub-set-row:last-child { border-bottom: none; }
.hub-set-label { flex: 1; }
.hub-set-title { font-size: 13.5px; font-weight: 500; color: var(--text); display: flex; align-items: center; }
.hub-req-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--warn); margin-left: 6px; }
.hub-set-desc { font-size: 11.5px; color: var(--text-3); margin-top: 3px; line-height: 1.5; }
.hub-set-ctrl { flex: none; }

/* controls */
.hub-toggle { width: 42px; height: 25px; border-radius: 13px; border: none; background: var(--chip-hover); cursor: pointer; position: relative; transition: background .18s; }
.hub-toggle[data-on] { background: var(--accent); }
.hub-toggle-knob { position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.35); transition: transform .18s var(--ease); }
.hub-toggle[data-on] .hub-toggle-knob { transform: translateX(17px); }
.hub-seg { display: inline-flex; gap: 0; padding: 3px; border-radius: 9px; background: var(--black-field); }
.hub-seg-opt { font-size: 12.5px; font-family: inherit; padding: 5px 12px; border-radius: 7px; border: none; background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.hub-seg-opt:hover { color: var(--text); }
.hub-seg-opt[data-on] { background: var(--accent); color: #fff; }
.hub-select { position: relative; }
.hub-select select { appearance: none; -webkit-appearance: none; font-size: 13px; font-family: inherit; color: var(--text); padding: 7px 30px 7px 12px; border-radius: 8px; background: var(--chip-hover); border: 1px solid var(--hairline); cursor: pointer; min-width: 180px; }
.hub-select select option { background: #20222c; }
.hub-select-caret { position: absolute; right: 9px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; }
.hub-keyfield { display: flex; align-items: center; gap: 8px; padding: 6px 6px 6px 11px; border-radius: 8px; background: var(--chip-hover); border: 1px solid var(--hairline); }
.hub-keyfield span { font-family: var(--mono); font-size: 12.5px; color: var(--text-2); }
.hub-keyfield button { font-size: 11px; font-family: inherit; padding: 4px 9px; border-radius: 6px; border: none; background: var(--chip); color: var(--text-2); cursor: pointer; }
.hub-keyfield button:hover { background: var(--accent); color: #fff; }

/* about */
.hub-about { display: flex; flex-direction: column; align-items: center; padding: 36px 20px; gap: 5px; }
.hub-about-logo { width: 56px; height: 56px; border-radius: 14px; background: var(--accent-weak); color: var(--accent-text); display: grid; place-items: center; margin-bottom: 8px; }
.hub-about-name { font-size: 18px; font-weight: 600; }
.hub-about-ver { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
.hub-about-desc { font-size: 12.5px; color: var(--text-2); margin-top: 6px; }

/* settings: appearance scheme grid */
.hub-scheme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.hub-scheme { text-align: left; padding: 11px; border-radius: 12px; background: var(--chip); border: 1px solid var(--hairline); cursor: pointer; transition: all .14s; }
.hub-scheme:hover { background: var(--chip-hover); }
.hub-scheme[data-on] { border-color: var(--accent); background: var(--accent-weak); }
.hub-scheme-preview { display: block; height: 40px; border-radius: 8px; position: relative; margin-bottom: 9px; overflow: hidden; }
.hub-scheme-accent { position: absolute; left: 10px; bottom: 10px; width: 26px; height: 8px; border-radius: 4px; }
.hub-scheme-nm { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 600; color: var(--text); }
.hub-scheme-nm svg { color: var(--accent-text); }
.hub-scheme-ds { display: block; font-size: 11px; color: var(--text-3); margin-top: 2px; }

/* settings: badge / gate banner / hotkey / notes */
.hub-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 7px; }
.hub-badge[data-kind="ok"] { background: rgba(79,208,160,.16); color: var(--ok); }
.hub-badge[data-kind="muted"] { background: var(--chip-hover); color: var(--text-3); }
.hub-gatebanner { display: flex; align-items: center; gap: 9px; padding: 11px 13px; border-radius: 11px; margin-bottom: 14px;
  background: rgba(224,145,92,.12); border: 1px solid rgba(224,145,92,.25); color: var(--warn); font-size: 12.5px; line-height: 1.5; }
.hub-gatebanner svg { flex: none; }
.hub-hotkey { display: flex; gap: 5px; }
.hub-hotkey kbd { font-family: var(--mono); font-size: 12px; color: var(--text); background: var(--chip-hover); border: 1px solid var(--hairline-strong); border-bottom-width: 2px; border-radius: 6px; padding: 3px 9px; }
.hub-foot-note { font-size: 11.5px; color: var(--text-3); line-height: 1.6; margin: 12px 2px 0; }
.hub-inline-note { font-size: 12px; color: var(--text-3); line-height: 1.55; margin: 0 0 10px 2px; }

/* settings: sortable action list */
.hub-sortable { display: flex; flex-direction: column; gap: 7px; }
.hub-sort-row { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 11px; background: var(--chip); border: 1px solid var(--hairline); cursor: grab; transition: background .14s, border-color .14s, transform .14s; }
.hub-sort-row:hover { background: var(--chip-hover); }
.hub-sort-row:active { cursor: grabbing; }
.hub-sort-row[data-over] { border-color: var(--accent); transform: translateY(1px); }
.hub-sort-grip { color: var(--text-3); display: grid; place-items: center; flex: none; }
.hub-sort-idx { font-family: var(--mono); font-size: 11px; color: var(--text-3); width: 14px; text-align: center; flex: none; }
.hub-sort-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--chip-hover); color: var(--accent-text); display: grid; place-items: center; flex: none; }
.hub-sort-label { font-size: 13.5px; font-weight: 500; color: var(--text); }
.hub-sort-note { margin-left: auto; font-size: 10.5px; color: var(--text-3); background: var(--chip-hover); padding: 2px 8px; border-radius: 6px; }

/* settings: radio rows (collect mode) */
.hub-radio-row { width: 100%; display: flex; align-items: flex-start; gap: 11px; padding: 13px 15px; border: none; border-bottom: 1px solid var(--hairline); background: transparent; cursor: pointer; text-align: left; transition: background .14s; }
.hub-radio-row:last-child { border-bottom: none; }
.hub-radio-row:hover { background: var(--chip-hover); }
.hub-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--text-3); flex: none; display: grid; place-items: center; margin-top: 1px; transition: border-color .14s; }
.hub-radio-row[data-on] .hub-radio { border-color: var(--accent); }
.hub-radio-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); transform: scale(0); transition: transform .14s var(--ease); }
.hub-radio-row[data-on] .hub-radio-dot { transform: scale(1); }
.hub-radio-title { font-size: 13.5px; font-weight: 500; color: var(--text); display: block; }
.hub-radio-desc { font-size: 11.5px; color: var(--text-3); margin-top: 3px; display: block; line-height: 1.5; }

/* toast */
.toast { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); display: flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: 9px; background: #fff; color: #1a1a1f; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: toast-in .2s var(--ease); z-index: 50; pointer-events: none; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%,8px); } to { opacity: 1; transform: translate(-50%,0); } }
</style>
</head>
<body>
<div id="root"></div>
