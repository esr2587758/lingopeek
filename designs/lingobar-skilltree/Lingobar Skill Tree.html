<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingobar — 语法星座</title>
<style>
/* ============================================================
   Lingobar 语法星座（放射状技能树 / 酷炫深空）
   完整英语语法体系：词法/句法两大支柱从中心散开。
   六边形节点 + 发光能量连线 + 同心引导环。
   三态(未探索/待掌握/已掌握)+盲区脉冲。点击右侧滑出详情含真实例句。
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #07080d; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
#root { height: 100vh; }

:root {
  --accent: #6e8bff; --accent-2: #8a7dff; --accent-text: #aab6ff; --accent-weak: rgba(110,139,255,.16);
  --glass: rgba(20,22,32,.86); --hairline: rgba(255,255,255,.09); --hairline-strong: rgba(255,255,255,.15);
  --text: rgba(255,255,255,.95); --text-2: rgba(255,255,255,.6); --text-3: rgba(255,255,255,.4);
  --chip: rgba(255,255,255,.06); --chip-hover: rgba(255,255,255,.11); --black-field: rgba(0,0,0,.28);
  --warn: #ff6b5e; --good: #4fc28a;
  --shadow: 0 0 0 1px rgba(255,255,255,.06), 0 30px 70px -18px rgba(0,0,0,.8);
  --radius: 16px; --mono: "Space Grotesk", ui-monospace, "SF Mono", Menlo, monospace;
  --read: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --ease: cubic-bezier(.22,.61,.36,1);
}

.stage { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
/* 深空壁纸 */
.wallpaper { position: absolute; inset: 0; background:
  radial-gradient(120% 120% at 50% 42%, #1b2138 0%, #12152a 42%, #0a0c18 72%, #07080d 100%); }
.wallpaper::after { content: ""; position: absolute; inset: 0; mix-blend-mode: screen; opacity: .9;
  background: radial-gradient(40% 50% at 78% 16%, rgba(255,150,100,.22), transparent 70%),
    radial-gradient(52% 58% at 88% 92%, rgba(130,90,220,.4), transparent 72%),
    radial-gradient(34% 42% at 10% 86%, rgba(70,190,210,.22), transparent 72%),
    radial-gradient(30% 36% at 16% 14%, rgba(110,139,255,.2), transparent 70%); }
.menubar { position: absolute; top: 0; left: 0; right: 0; height: 26px; display: flex; align-items: center; gap: 18px;
  padding: 0 14px; font-size: 13px; color: rgba(255,255,255,.92); background: rgba(0,0,0,.25);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 5; }
.menubar .mb-app { font-weight: 600; } .menubar .mb-item { opacity: .8; }
.menubar .mb-right { margin-left: auto; display: flex; align-items: center; gap: 16px; opacity: .9; }
.menubar .mono { font-variant-numeric: tabular-nums; }

/* window */
.skwin { position: absolute; top: 46px; left: 50%; transform: translateX(-50%); width: 940px;
  height: calc(100vh - 72px); max-height: 820px; display: flex; flex-direction: column; border-radius: var(--radius);
  background: var(--glass); backdrop-filter: blur(34px) saturate(150%); -webkit-backdrop-filter: blur(34px) saturate(150%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline); overflow: hidden; animation: win-in .3s var(--ease); }
@keyframes win-in { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%); } }

.sk-titlebar { padding: 13px 20px 11px; border-bottom: 1px solid var(--hairline); flex: none; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.sk-title { display: flex; align-items: center; gap: 11px; }
.sk-title-ic { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-weak); color: var(--accent-text); display: grid; place-items: center; box-shadow: 0 0 14px rgba(110,139,255,.4); }
.sk-title-name { font-size: 15.5px; font-weight: 600; letter-spacing: .01em; }
.sk-title-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

.sk-legend { margin-left: auto; display: flex; flex-wrap: wrap; gap: 12px; }
.sk-legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-2); }
.sk-legend-item b { color: var(--text); font-weight: 500; }
.sk-legend-hex { width: 12px; height: 13px; flex: none; clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); }
.sk-legend-item[data-state="locked"] .sk-legend-hex { background: rgba(255,255,255,.12); }
.sk-legend-item[data-state="unlocked"] .sk-legend-hex { background: rgba(110,139,255,.55); box-shadow: 0 0 6px rgba(110,139,255,.7); }
.sk-legend-item[data-state="mastered"] .sk-legend-hex { background: var(--good); box-shadow: 0 0 6px rgba(79,194,138,.7); }
.sk-legend-item[data-blind] .sk-legend-hex { background: var(--warn); box-shadow: 0 0 7px var(--warn); }

.sk-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.sk-overview { padding: 12px 20px; border-bottom: 1px solid var(--hairline); display: flex; align-items: center; gap: 20px; flex: none; }
.sk-ov-line { flex: 1; display: flex; align-items: center; gap: 9px; font-size: 13.5px; color: var(--text); font-weight: 500; }
.sk-ov-ic { color: var(--accent-text); flex: none; }
.sk-ov-stats { display: flex; gap: 8px; flex: none; }
.sk-ov-stat { background: rgba(0,0,0,.25); border-radius: 9px; padding: 7px 13px; text-align: center; min-width: 56px; border: 1px solid var(--hairline); }
.sk-ov-v { display: block; font-size: 17px; font-weight: 700; font-family: var(--mono); }
.sk-ov-k { font-size: 10px; color: var(--text-3); margin-top: 1px; display: block; white-space: nowrap; }

/* canvas */
.sk-canvas { flex: 1; min-height: 0; position: relative; overflow: hidden; }
.sk-svg { width: 100%; height: 100%; display: block; }
.sk-zoom { position: absolute; right: 14px; bottom: 14px; z-index: 3; display: flex; flex-direction: column; gap: 5px;
  background: var(--glass); border: 1px solid var(--hairline); border-radius: 10px; padding: 5px; backdrop-filter: blur(20px); }
.sk-zoom button { width: 30px; height: 30px; border-radius: 7px; border: none; background: transparent; color: var(--text-2); cursor: pointer; display: grid; place-items: center; transition: all .14s; }
.sk-zoom button:hover { background: var(--chip-hover); color: var(--text); }

/* edges + energy flow */
.sk-edge { stroke-width: 2.2; }
.sk-edge[data-locked] { stroke-dasharray: 3 5; stroke-width: 1.5; }
.sk-edge-flow { stroke-width: 2.2; stroke-opacity: .9; stroke-dasharray: 2 14; animation: sk-flow 1.4s linear infinite; }
@keyframes sk-flow { to { stroke-dashoffset: -16; } }

/* hex nodes */
.sk-hex polygon { transition: fill .15s, stroke .15s, fill-opacity .15s; }
.sk-hex-fill { fill: #14161e; }
.sk-hex-stroke { fill: none; stroke-width: 2; }
.sk-hex-label { fill: #fff; font-weight: 600; font-family: var(--read); pointer-events: none; paint-order: stroke; stroke: rgba(0,0,0,.4); stroke-width: 2.6px; }
.sk-hex-lock { color: rgba(255,255,255,.3); pointer-events: none; }
.sk-hex-badge { color: var(--good); pointer-events: none; }
.sk-hex-badge.blind { color: var(--warn); }

.sk-hex[data-root] .sk-hex-fill { fill: color-mix(in srgb, var(--accent) 60%, #14161e); }
.sk-hex[data-root] .sk-hex-stroke { stroke: #fff; stroke-width: 2.4; }
.sk-hex[data-state="locked"] .sk-hex-fill { fill: rgba(255,255,255,.03); }
.sk-hex[data-state="locked"] .sk-hex-stroke { stroke: rgba(255,255,255,.13); stroke-dasharray: 3 4; }
.sk-hex[data-state="unlocked"] .sk-hex-fill { fill: color-mix(in srgb, var(--cat) 18%, #14161e); }
.sk-hex[data-state="unlocked"] .sk-hex-stroke { stroke: var(--cat); }
.sk-hex[data-state="mastered"] .sk-hex-fill { fill: color-mix(in srgb, var(--cat) 62%, #10121a); }
.sk-hex[data-state="mastered"] .sk-hex-stroke { stroke: color-mix(in srgb, var(--cat) 80%, #fff); }
.sk-hex:hover .sk-hex-stroke { stroke: #fff; }
.sk-hex[data-sel] .sk-hex-stroke { stroke: #fff; stroke-width: 3; }

/* blind pulse */
.sk-hex[data-blind] .sk-hex-stroke { stroke: var(--warn) !important; }
.sk-hex-pulse { fill: none; stroke: var(--warn); stroke-width: 2.2; animation: sk-pulse 2.1s var(--ease) infinite; transform-box: fill-box; transform-origin: center; }
@keyframes sk-pulse { 0% { stroke-opacity: .65; transform: scale(1); } 55% { stroke-opacity: .08; transform: scale(1.12); } 100% { stroke-opacity: .65; transform: scale(1); } }

/* ===== detail: 右侧滑出面板 ===== */
.sk-detail-scrim { position: absolute; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(2px); z-index: 40; animation: fade .15s; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.sk-panel { position: absolute; top: 0; right: 0; height: 100%; width: 330px; background: var(--glass); backdrop-filter: blur(34px) saturate(150%);
  border-left: 1px solid var(--hairline-strong); box-shadow: -20px 0 50px -20px rgba(0,0,0,.7); padding: 18px 18px 16px; display: flex; flex-direction: column;
  border-top: 3px solid var(--cat); animation: slide-in .26s var(--ease); }
@keyframes slide-in { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.sk-panel-head { display: flex; align-items: flex-start; }
.sk-panel-cat { font-size: 11px; font-weight: 600; color: var(--cat); }
.sk-panel-label { font-size: 22px; font-weight: 700; margin-top: 4px; font-family: var(--read); display: flex; align-items: center; gap: 8px; flex: 1; }
.sk-panel-flame { color: var(--warn); display: inline-grid; place-items: center; }
.sk-panel-close { margin-left: auto; width: 28px; height: 28px; border-radius: 8px; border: none; background: var(--chip); color: var(--text-3); cursor: pointer; display: grid; place-items: center; flex: none; }
.sk-panel-close:hover { background: var(--chip-hover); color: var(--text); }
.sk-panel-state { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-2); margin-top: 9px; }
.sk-panel-statedot { width: 8px; height: 8px; border-radius: 50%; background: var(--cat); }
.sk-panel-state[data-state="mastered"] { color: var(--good); } .sk-panel-state[data-state="mastered"] .sk-panel-statedot { background: var(--good); }
.sk-panel-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0 9px; }
.sk-pm { background: rgba(0,0,0,.26); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid var(--hairline); }
.sk-pm-v { display: block; font-size: 19px; font-weight: 700; font-family: var(--mono); }
.sk-pm-k { font-size: 10px; color: var(--text-3); margin-top: 2px; display: block; }
.sk-panel-bar { height: 6px; border-radius: 3px; background: var(--black-field); overflow: hidden; margin-bottom: 16px; }
.sk-panel-bar span { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--cat), color-mix(in srgb, var(--cat) 55%, #fff)); box-shadow: 0 0 10px var(--cat); }

/* 例句列表 */
.sk-eg-head { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; }
.sk-eg-head svg { color: var(--accent-text); }
.sk-eg-count { margin-left: auto; font-size: 10.5px; color: var(--text-3); background: var(--chip); padding: 1px 8px; border-radius: 8px; }
.sk-eg-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin: 0 -4px; padding: 0 4px; }
.sk-eg-empty { font-size: 12px; color: var(--text-3); text-align: center; padding: 24px 0; }
.sk-eg { display: flex; gap: 9px; padding: 10px 11px; border-radius: 11px; background: rgba(0,0,0,.22); border: 1px solid var(--hairline); }
.sk-eg-bar { width: 3px; border-radius: 2px; background: var(--cat); flex: none; }
.sk-eg-text { font-size: 13px; line-height: 1.5; color: var(--text); font-family: var(--read); }
.sk-eg-meta { font-size: 10.5px; color: var(--text-3); margin-top: 5px; }
.sk-eg-src { color: var(--accent-text); }

.sk-panel-foot { display: flex; gap: 8px; margin-top: 14px; flex: none; }
.sk-panel-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px; height: 36px; border-radius: 9px; border: none;
  background: var(--chip); color: var(--text-2); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .14s; }
.sk-panel-btn:hover { background: var(--chip-hover); color: var(--text); }
.sk-panel-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 0 16px rgba(110,139,255,.4); }
.sk-panel-btn.primary:hover { filter: brightness(1.1); }

.toast { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); display: flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: 9px; background: #fff; color: #1a1a1f; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: toast-in .2s var(--ease); z-index: 50; pointer-events: none; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%,8px); } to { opacity: 1; transform: translate(-50%,0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
