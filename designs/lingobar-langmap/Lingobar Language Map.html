<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lingobar — 我的语言地图</title>
<style>
/* ============================================================
   Lingobar 我的语言地图（成长 / 镜子型）
   核心视觉：暴露 vs 掌握的差值 → 警示色阶，高频盲区自己亮起。
   三形态：星系 / 体系板块 / 卡片墙。深色玻璃单配色。
   ============================================================ */
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
  background: #0d0e12; color: #fff; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow: hidden; }
#root { height: 100vh; }

:root {
  --accent: #6e8bff; --accent-2: #8a7dff; --accent-text: #aab6ff; --accent-weak: rgba(110,139,255,.16);
  --glass: rgba(28,30,40,.82); --hairline: rgba(255,255,255,.09); --hairline-strong: rgba(255,255,255,.15);
  --text: rgba(255,255,255,.95); --text-2: rgba(255,255,255,.6); --text-3: rgba(255,255,255,.4);
  --chip: rgba(255,255,255,.06); --chip-hover: rgba(255,255,255,.11); --black-field: rgba(0,0,0,.22);
  --warn: #ff6b5e; --good: #3a8d6f;
  --shadow: 0 0 0 1px rgba(255,255,255,.06), 0 30px 70px -18px rgba(0,0,0,.75);
  --radius: 16px; --mono: "Space Grotesk", ui-monospace, "SF Mono", Menlo, monospace;
  --read: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
  --ease: cubic-bezier(.22,.61,.36,1);
}

.stage { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
.wallpaper { position: absolute; inset: 0; background: radial-gradient(130% 130% at 14% 6%, #2d3a66 0%, #232a4a 34%, #1a1d33 64%, #111322 100%); }
.wallpaper::after { content: ""; position: absolute; inset: 0; mix-blend-mode: screen;
  background: radial-gradient(38% 46% at 84% 12%, rgba(255,160,110,.3), transparent 70%),
    radial-gradient(48% 56% at 90% 94%, rgba(120,90,210,.38), transparent 70%),
    radial-gradient(30% 40% at 12% 92%, rgba(70,190,200,.2), transparent 70%); }
.menubar { position: absolute; top: 0; left: 0; right: 0; height: 26px; display: flex; align-items: center; gap: 18px;
  padding: 0 14px; font-size: 13px; color: rgba(255,255,255,.92); background: rgba(0,0,0,.2);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 5; }
.menubar .mb-app { font-weight: 600; } .menubar .mb-item { opacity: .8; }
.menubar .mb-right { margin-left: auto; display: flex; align-items: center; gap: 16px; opacity: .9; }
.menubar .mono { font-variant-numeric: tabular-nums; }

/* window */
.lmwin { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); width: 760px;
  height: calc(100vh - 84px); max-height: 760px; display: flex; flex-direction: column; border-radius: var(--radius);
  background: var(--glass); backdrop-filter: blur(30px) saturate(155%); -webkit-backdrop-filter: blur(30px) saturate(155%);
  box-shadow: var(--shadow); border: 1px solid var(--hairline); overflow: hidden; animation: win-in .28s var(--ease); }
@keyframes win-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%); } }

.lm-titlebar { padding: 15px 20px 13px; border-bottom: 1px solid var(--hairline); flex: none; }
.lm-title { display: flex; align-items: center; gap: 11px; }
.lm-title-ic { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-weak); color: var(--accent-text); display: grid; place-items: center; }
.lm-title-name { font-size: 15.5px; font-weight: 600; }
.lm-title-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

.lm-scroll { flex: 1; overflow-y: auto; padding: 16px 20px 22px; display: flex; flex-direction: column; gap: 14px; }

/* portrait */
.lm-portrait { border-radius: 14px; background: linear-gradient(180deg, rgba(110,139,255,.1), rgba(110,139,255,.03)); border: 1px solid var(--hairline); padding: 15px 16px; }
.lm-portrait-line { display: flex; align-items: flex-start; gap: 9px; font-size: 14.5px; line-height: 1.55; color: var(--text); font-weight: 500; }
.lm-portrait-icon { color: var(--accent-text); flex: none; margin-top: 1px; }
.lm-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
.lm-stat { background: rgba(0,0,0,.18); border-radius: 10px; padding: 10px 12px; }
.lm-stat-v { display: block; font-size: 22px; font-weight: 700; font-family: var(--mono); letter-spacing: -.01em; }
.lm-stat-v i { font-size: 12px; font-style: normal; color: var(--text-3); margin-left: 1px; }
.lm-stat-k { font-size: 11px; color: var(--text-3); margin-top: 2px; display: block; }

/* map card */
.lm-mapcard { border-radius: 14px; background: rgba(0,0,0,.16); border: 1px solid var(--hairline); padding: 13px 14px 12px; }
.lm-maphead { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.lm-formtabs { display: flex; gap: 6px; }
.lm-formtab { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 500; font-family: inherit;
  padding: 7px 12px; border-radius: 9px; border: 1px solid var(--hairline); background: transparent; color: var(--text-2); cursor: pointer; transition: all .14s; }
.lm-formtab:hover { background: var(--chip); color: var(--text); }
.lm-formtab[data-on="true"] { background: var(--accent-weak); color: var(--accent-text); border-color: transparent; font-weight: 600; }
.lm-coverage { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-3); }
.lm-coverage-track { width: 88px; height: 6px; border-radius: 3px; background: var(--black-field); overflow: hidden; }
.lm-coverage-track i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: 3px; }

/* legend */
.lm-legend { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin: 12px 2px; }
.lm-legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-2); }
.lm-legend-item b { font-weight: 600; color: var(--text); }
.lm-legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.lm-legend-desc { color: var(--text-3); }
.lm-legend-hint { margin-left: auto; font-size: 10.5px; color: var(--text-3); font-style: italic; }

.lm-mapstage { min-height: 360px; }
.lm-formhint { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 8px; }

/* galaxy */
.lm-galaxy { width: 100%; }
.lm-galaxy-svg { width: 100%; height: 360px; display: block; }
.lm-node-label { fill: #fff; font-weight: 600; font-family: var(--read); pointer-events: none; paint-order: stroke; stroke: rgba(0,0,0,.25); stroke-width: 2px; }
.lm-node-met { fill: rgba(255,255,255,.7); font-size: 8px; font-family: var(--mono); pointer-events: none; }
.lm-node circle { transition: fill-opacity .15s, r .15s; }
.lm-node:hover circle:not(.lm-pulse) { fill-opacity: 1; }
.lm-pulse { animation: lm-pulse 2.4s var(--ease) infinite; transform-origin: center; }
@keyframes lm-pulse { 0% { stroke-opacity: .5; } 50% { stroke-opacity: .12; } 100% { stroke-opacity: .5; } }

/* system blocks */
.lm-system { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.lm-sys-block { border-radius: 12px; background: var(--chip); border: 1px solid var(--hairline); border-left: 3px solid var(--cat); padding: 11px 12px; }
.lm-sys-head { display: flex; align-items: baseline; justify-content: space-between; }
.lm-sys-name { font-size: 13px; font-weight: 600; color: var(--text); }
.lm-sys-cov { font-size: 10.5px; color: var(--text-3); }
.lm-sys-bar { height: 4px; border-radius: 2px; background: var(--black-field); margin: 8px 0 10px; overflow: hidden; }
.lm-sys-bar span { display: block; height: 100%; background: var(--cat); border-radius: 2px; opacity: .8; }
.lm-sys-items { display: flex; flex-wrap: wrap; gap: 6px; }
.lm-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-family: inherit; padding: 5px 9px; border-radius: 8px;
  border: 1px solid var(--hairline); background: rgba(0,0,0,.18); color: var(--text); cursor: pointer; transition: all .14s; }
.lm-chip:hover { background: var(--chip-hover); }
.lm-chip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gap); flex: none; }
.lm-chip[data-level="blind"] { border-color: color-mix(in srgb, var(--gap) 55%, transparent); }
.lm-chip-met { font-size: 10px; font-family: var(--mono); color: var(--text-3); }

/* card wall */
.lm-wall { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px; }
.lm-wall-head { display: flex; align-items: center; gap: 7px; padding: 0 2px 9px; }
.lm-wall-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--lv); }
.lm-wall-title { font-size: 12.5px; font-weight: 600; color: var(--text); }
.lm-wall-count { margin-left: auto; font-size: 10.5px; color: var(--text-3); background: var(--chip); padding: 1px 7px; border-radius: 7px; }
.lm-wall-list { display: flex; flex-direction: column; gap: 8px; }
.lm-wallcard { text-align: left; border-radius: 11px; background: var(--chip); border: 1px solid var(--hairline); border-left: 3px solid var(--gap); padding: 10px 11px; cursor: pointer; transition: background .14s; }
.lm-wallcard:hover { background: var(--chip-hover); }
.lm-wallcard-top { display: flex; align-items: baseline; justify-content: space-between; gap: 6px; }
.lm-wallcard-label { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.lm-wallcard-cat { font-size: 10px; color: var(--text-3); flex: none; }
.lm-wallcard-bars { margin-top: 9px; display: flex; flex-direction: column; gap: 5px; }
.lm-mini { display: flex; align-items: center; gap: 7px; }
.lm-mini-k { font-size: 9.5px; color: var(--text-3); width: 24px; flex: none; }
.lm-mini-track { flex: 1; height: 5px; border-radius: 3px; background: var(--black-field); overflow: hidden; }
.lm-mini-track i { display: block; height: 100%; border-radius: 3px; }
.lm-mini-v { font-size: 9.5px; font-family: var(--mono); color: var(--text-2); width: 28px; text-align: right; flex: none; }

/* bottom: insights + trail */
.lm-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.lm-insights, .lm-trail { border-radius: 14px; background: rgba(0,0,0,.16); border: 1px solid var(--hairline); padding: 13px 14px; }
.lm-insights-head, .lm-trail-head { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 11px; }
.lm-insights-head svg, .lm-trail-head svg { color: var(--accent-text); }
.lm-insight { display: flex; align-items: flex-start; gap: 9px; padding: 9px 0; border-bottom: 1px solid var(--hairline); }
.lm-insight:last-child { border-bottom: none; }
.lm-insight-ic { flex: none; width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center; margin-top: 1px; }
.lm-insight[data-tone="warn"] .lm-insight-ic { background: rgba(255,107,94,.16); color: var(--warn); }
.lm-insight[data-tone="good"] .lm-insight-ic { background: rgba(58,141,111,.2); color: #6fcaa3; }
.lm-insight-text { flex: 1; font-size: 12.5px; color: var(--text); line-height: 1.5; }
.lm-insight-act { flex: none; display: inline-flex; align-items: center; gap: 3px; font-size: 11.5px; font-weight: 600; font-family: inherit;
  padding: 4px 9px; border-radius: 7px; border: none; background: var(--accent-weak); color: var(--accent-text); cursor: pointer; transition: all .14s; align-self: center; }
.lm-insight-act:hover { background: var(--accent); color: #fff; }

/* trail */
.lm-trail-list { display: flex; flex-direction: column; gap: 13px; }
.lm-trailrow { display: grid; grid-template-columns: 92px 1fr auto; align-items: center; gap: 10px; }
.lm-trail-label { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lm-trail-track { position: relative; height: 6px; border-radius: 3px; background: var(--black-field); }
.lm-trail-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--warn), #e0b052); }
.lm-trail-fill[data-done] { background: linear-gradient(90deg, #e0b052, var(--good)); }
.lm-trail-from { position: absolute; top: 50%; width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); transform: translate(-50%,-50%); }
.lm-trail-to { position: absolute; top: 50%; width: 9px; height: 9px; border-radius: 50%; background: #e0b052; transform: translate(-50%,-50%); box-shadow: 0 0 0 2px rgba(0,0,0,.3); }
.lm-trail-to[data-done] { background: var(--good); }
.lm-trail-note { font-size: 10.5px; color: var(--text-3); white-space: nowrap; }
.lm-trail-note[data-done] { color: #6fcaa3; }

/* node detail modal */
.lm-detail-scrim { position: absolute; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(3px); display: grid; place-items: center; z-index: 40; animation: fade .15s; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.lm-detail { width: 340px; border-radius: 16px; background: var(--glass); border: 1px solid var(--hairline-strong); box-shadow: var(--shadow); padding: 16px 17px 14px; border-top: 3px solid var(--gap); animation: pop .2s var(--ease); }
@keyframes pop { from { opacity: 0; transform: scale(.96) translateY(6px); } to { opacity: 1; } }
.lm-detail-head { display: flex; align-items: center; }
.lm-detail-cat { font-size: 11px; font-weight: 600; flex: 1; }
.lm-detail-close { width: 26px; height: 26px; border-radius: 7px; border: none; background: transparent; color: var(--text-3); cursor: pointer; display: grid; place-items: center; }
.lm-detail-close:hover { background: var(--chip-hover); color: var(--text); }
.lm-detail-label { font-size: 19px; font-weight: 700; margin-top: 6px; font-family: var(--read); }
.lm-detail-level { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-2); margin-top: 7px; }
.lm-detail-leveldot { width: 8px; height: 8px; border-radius: 50%; background: var(--gap); }
.lm-detail-metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 14px 0 12px; }
.lm-dmetric { background: rgba(0,0,0,.2); border-radius: 10px; padding: 10px; text-align: center; }
.lm-dmetric-v { display: block; font-size: 19px; font-weight: 700; font-family: var(--mono); }
.lm-dmetric-k { font-size: 10px; color: var(--text-3); margin-top: 2px; display: block; }
.lm-detail-meta { font-size: 11.5px; color: var(--text-3); line-height: 1.5; }
.lm-detail-meta b { color: var(--text-2); }
.lm-detail-foot { display: flex; gap: 8px; margin-top: 14px; }
.lm-detail-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px; height: 34px; border-radius: 9px; border: none;
  background: var(--chip); color: var(--text-2); font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all .14s; }
.lm-detail-btn:hover { background: var(--chip-hover); color: var(--text); }
.lm-detail-btn.primary { background: var(--accent); color: #fff; }
.lm-detail-btn.primary:hover { filter: brightness(1.08); }

/* toast */
.toast { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); display: flex; align-items: center; gap: 7px;
  padding: 8px 15px; border-radius: 9px; background: #fff; color: #1a1a1f; font-size: 12.5px; font-weight: 600;
  box-shadow: 0 12px 30px -8px rgba(0,0,0,.5); animation: toast-in .2s var(--ease); z-index: 50; pointer-events: none; }
@keyframes toast-in { from { opacity: 0; transform: translate(-50%,8px); } to { opacity: 1; transform: translate(-50%,0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
