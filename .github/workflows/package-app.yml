name: Package macOS App

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and package LingoPeek.app
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run core checks
        run: swift run LingoPeekCoreChecks

      - name: Package app
        run: scripts/package_app.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LingoPeek-macOS-${{ github.sha }}
          path: dist/LingoPeek.zip
          if-no-files-found: error
          retention-days: 14
